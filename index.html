<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>常闇 — canvas note</title>
<meta property="og:title" content="常闇 — canvas note">
<meta property="og:description" content="写真を並べて、あなただけのキャンバスをつくる">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="常闇 — canvas note">
<meta name="twitter:description" content="写真を並べて、あなただけのキャンバスをつくる">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Shippori+Mincho:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f2ec;--bg2:#edeae2;
  --ink:#18140e;--ink2:#4a4540;--ink3:#9a948e;
  --gold:#b8a07a;--sh:rgba(24,20,14,.14);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'EB Garamond',serif;color:var(--ink);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9900;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;mix-blend-mode:multiply;}
#three-bg{position:fixed;inset:0;z-index:0;}

/* CURSOR */
#cur{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--ink);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;}
#cur-ring{position:fixed;width:28px;height:28px;border-radius:50%;border:1px solid rgba(24,20,14,.28);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;}

/* MODE BAR */
#mode-bar{position:fixed;top:0;left:0;right:0;z-index:600;display:flex;justify-content:center;background:linear-gradient(to bottom,var(--bg) 55%,transparent);pointer-events:none;padding-top:22px;}
#mode-inner{display:flex;align-items:center;background:rgba(246,242,236,.9);backdrop-filter:blur(14px);border:1px solid rgba(184,160,122,.3);border-radius:30px;overflow:hidden;pointer-events:all;}
.mode-tab{font-family:'EB Garamond',serif;font-size:12.5px;letter-spacing:.18em;color:var(--ink3);background:none;border:none;cursor:pointer;padding:9px 22px;border-radius:26px;transition:color .25s,background .25s;white-space:nowrap;}
.mode-tab.active{color:var(--ink);background:rgba(184,160,122,.22);}
.mode-sep{width:1px;height:16px;background:rgba(184,160,122,.3);flex-shrink:0;}

/* HEADER */
#hdr{position:fixed;top:72px;left:40px;z-index:500;pointer-events:none;}
#hdr-name{font-family:'EB Garamond',serif;font-size:13px;letter-spacing:.22em;font-style:italic;color:var(--ink);opacity:.75;}
#hdr-sub{font-family:'Shippori Mincho',serif;font-size:9.5px;letter-spacing:.35em;color:var(--ink3);margin-top:5px;}

/* SOUND */
#snd-btn{position:fixed;top:80px;right:36px;z-index:600;background:none;border:none;cursor:pointer;font-family:'EB Garamond',serif;font-size:11.5px;letter-spacing:.18em;color:var(--ink3);display:flex;align-items:center;gap:7px;padding:4px;transition:color .2s;}
#snd-btn:hover{color:var(--ink2);}
#waves{display:flex;gap:2px;align-items:center;height:13px;}
.wb{width:2px;border-radius:1px;background:var(--gold);}
.wb.m{height:3px!important;animation:none!important;}
.wb.a1{height:4px;animation:w1 1.3s ease-in-out infinite;}
.wb.a2{height:8px;animation:w2 1.5s ease-in-out infinite;}
.wb.a3{height:5px;animation:w3 1.2s ease-in-out infinite;}
.wb.a4{height:9px;animation:w4 1.7s ease-in-out infinite;}
@keyframes w1{0%,100%{height:4px}50%{height:11px}}
@keyframes w2{0%,100%{height:8px}50%{height:3px}}
@keyframes w3{0%,100%{height:5px}50%{height:12px}}
@keyframes w4{0%,100%{height:9px}50%{height:4px}}

/* BOARD */
#board{position:fixed;inset:0;z-index:10;overflow:hidden;cursor:none;}

/* PHOTO ITEM */
.photo-item{position:absolute;cursor:none;user-select:none;transform-origin:center;will-change:transform;}
.photo-shell{position:relative;background:#f0ece4;box-shadow:0 6px 24px var(--sh),0 1px 2px rgba(24,20,14,.06);transition:box-shadow .3s;overflow:hidden;}
.photo-item:hover .photo-shell{box-shadow:0 18px 50px var(--sh);}
.photo-item.dragging .photo-shell{box-shadow:0 28px 70px rgba(24,20,14,.2);}
.photo-shell img{display:block;width:100%;height:100%;object-fit:cover;object-position:center;filter:saturate(.7) contrast(.93) brightness(1.07);transition:filter .35s;}
.photo-item:hover .photo-shell img{filter:saturate(.8) contrast(.96) brightness(1.1);}
.tape{position:absolute;pointer-events:none;background:rgba(210,192,158,.38);}

/* RESIZE HANDLE */
.photo-item.selected .photo-shell::after{
  content:'';position:absolute;bottom:-5px;right:-5px;
  width:18px;height:18px;
  background:var(--ink);border-radius:50%;cursor:se-resize;
  opacity:.7;transition:opacity .2s;z-index:10;
}
.photo-item.selected .photo-shell::after:hover{opacity:1;}
.photo-item.selected .photo-shell{
  outline:1.5px solid rgba(184,160,122,.7);
  outline-offset:3px;
}
.resize-handle{
  position:absolute;bottom:-6px;right:-6px;
  width:20px;height:20px;border-radius:50%;
  background:var(--ink);cursor:se-resize;z-index:20;
  opacity:.75;transition:opacity .2s;
  display:none;
}
.photo-item.selected .resize-handle{display:block;}
.resize-handle:hover{opacity:1;}

/* NAV */
#nav{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:600;display:flex;align-items:center;background:rgba(246,242,236,.9);backdrop-filter:blur(14px);border:1px solid rgba(184,160,122,.3);border-radius:30px;overflow:hidden;}
.nav-btn{font-family:'EB Garamond',serif;font-size:12px;letter-spacing:.15em;color:var(--ink3);background:none;border:none;cursor:pointer;padding:10px 22px;transition:color .2s,background .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--ink);background:rgba(184,160,122,.1);}
.nav-btn.finish{color:var(--ink2);letter-spacing:.12em;}
.nav-btn.finish:hover{color:var(--ink);background:rgba(184,160,122,.18);}
.nav-sep{width:1px;background:rgba(184,160,122,.3);align-self:stretch;}

/* INFO */
#info-line{position:fixed;bottom:32px;left:36px;z-index:500;font-family:'Shippori Mincho',serif;font-size:9.5px;letter-spacing:.28em;color:var(--ink3);pointer-events:none;}

/* DROP OVERLAY */
#drop-overlay{position:fixed;inset:0;z-index:700;border:2px dashed rgba(184,160,122,.45);background:rgba(246,242,236,.78);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .35s;cursor:pointer;}
#drop-overlay.active{opacity:1;pointer-events:all;}
#drop-overlay p{font-family:'EB Garamond',serif;font-size:22px;font-style:italic;letter-spacing:.1em;color:var(--ink2);}
#drop-overlay small{font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.3em;color:var(--ink3);}
#drop-close{position:absolute;top:28px;right:36px;background:none;border:none;cursor:pointer;font-size:24px;color:var(--ink3);transition:color .2s;line-height:1;pointer-events:all;}
#drop-close:hover{color:var(--ink);}
#file-input{display:none;}

/* COMPLETE OVERLAY */
#complete-overlay{
  position:fixed;inset:0;z-index:800;
  background:rgba(246,242,236,.96);backdrop-filter:blur(26px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  opacity:0;pointer-events:none;transition:opacity .6s;
  overflow-y:auto;padding:60px 20px 40px;
}
#complete-overlay.open{opacity:1;pointer-events:all;}
#complete-overlay h1{font-family:'EB Garamond',serif;font-size:48px;font-weight:400;font-style:italic;letter-spacing:.1em;color:var(--ink);text-align:center;flex-shrink:0;}
#co-sub{font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.35em;color:var(--ink3);text-align:center;flex-shrink:0;}
#canvas-preview-wrap{position:relative;width:min(660px,88vw);flex-shrink:0;}
#canvas-preview{display:block;width:100%;box-shadow:0 12px 50px rgba(24,20,14,.18);}
#preview-gen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(246,242,236,.7);font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.3em;color:var(--ink3);}
.co-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
.co-btn{font-family:'EB Garamond',serif;font-size:12.5px;letter-spacing:.12em;color:var(--ink2);background:none;border:1px solid rgba(184,160,122,.45);border-radius:3px;padding:10px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.co-btn:hover{background:var(--bg2);color:var(--ink);}
.co-btn.x-btn:hover{background:#000;color:#fff;border-color:#000;}
.co-btn.ig-btn:hover{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border-color:transparent;}
#co-msg{font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.3em;color:var(--gold);min-height:16px;opacity:0;transition:opacity .3s;text-align:center;flex-shrink:0;}
#co-msg.show{opacity:1;}
#complete-close{position:absolute;top:28px;right:36px;background:none;border:none;cursor:pointer;font-size:26px;color:var(--ink3);transition:color .2s;line-height:1;}
#complete-close:hover{color:var(--ink);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.4s,visibility 1.4s;}
#intro.gone{opacity:0;visibility:hidden;}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.i-name{font-family:'EB Garamond',serif;font-size:56px;font-weight:400;font-style:italic;letter-spacing:.12em;color:var(--ink);opacity:0;animation:rise 1.6s .2s cubic-bezier(.23,1,.32,1) forwards;}
.i-sub{font-family:'Shippori Mincho',serif;font-size:11px;letter-spacing:.4em;color:var(--ink3);margin-top:14px;opacity:0;animation:rise 1.6s .7s cubic-bezier(.23,1,.32,1) forwards;}
.i-line{width:40px;height:1px;background:rgba(184,160,122,.4);margin:28px auto;opacity:0;animation:rise 1.6s 1.1s cubic-bezier(.23,1,.32,1) forwards;}
.i-enter{font-family:'EB Garamond',serif;font-size:13px;letter-spacing:.22em;color:var(--ink3);background:none;border:1px solid rgba(184,160,122,.4);border-radius:2px;padding:10px 36px;cursor:pointer;transition:all .3s;opacity:0;animation:rise 1.6s 1.5s cubic-bezier(.23,1,.32,1) forwards;}
.i-enter:hover{color:var(--ink);border-color:var(--gold);background:var(--bg2);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:1100;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s;}
#loading.gone{opacity:0;visibility:hidden;}
#loading-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#mode-flash{position:fixed;inset:0;z-index:750;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .35s;}
</style>
</head>
<body>

<div id="loading"><div id="loading-dot"></div></div>
<canvas id="three-bg"></canvas>
<div id="cur"></div><div id="cur-ring"></div>

<!-- INTRO -->
<div id="intro">
  <div class="i-name" id="intro-name">常闇</div>
  <div class="i-sub" id="intro-sub">a quiet archive</div>
  <div class="i-line"></div>
  <button class="i-enter" id="i-enter">enter</button>
</div>

<!-- MODE BAR -->
<div id="mode-bar">
  <div id="mode-inner">
    <button class="mode-tab active" id="tab-portfolio">常闇の作品</button>
    <div class="mode-sep"></div>
    <button class="mode-tab" id="tab-visitor">あなたのキャンバス</button>
  </div>
</div>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-name">常闇</div>
  <div id="hdr-sub">canvas note</div>
</div>

<!-- SOUND -->
<button id="snd-btn">
  <div id="waves">
    <div class="wb a1 m"></div><div class="wb a2 m"></div>
    <div class="wb a3 m"></div><div class="wb a4 m"></div>
  </div>
  <span id="snd-lbl">sound</span>
</button>

<!-- BOARD -->
<div id="board"></div>

<!-- NAV -->
<div id="nav">
  <!-- portfolio mode only -->
  <button class="nav-btn" id="btn-reset">reset</button>
  <!-- visitor mode only — hidden by default -->
  <button class="nav-btn" id="btn-add-more"  style="display:none">+ 写真を追加</button>
  <div class="nav-sep"    id="sep-add"        style="display:none"></div>
  <button class="nav-btn" id="btn-restart"    style="display:none">↩ 最初から</button>
  <div class="nav-sep"    id="sep-restart"    style="display:none"></div>
  <button class="nav-btn finish" id="btn-finish" style="display:none">完成する →</button>
</div>
<input type="file" id="file-input" accept="image/*" multiple>

<!-- INFO -->
<div id="info-line"><span id="info-text">ドラッグして鑑賞する</span></div>

<!-- DROP OVERLAY -->
<div id="drop-overlay">
  <button id="drop-close">×</button>
  <p>写真をドロップ</p>
  <small>または クリックして選択</small>
</div>

<!-- COMPLETE OVERLAY -->
<div id="complete-overlay">
  <button id="complete-close">×</button>
  <h1>beautiful.</h1>
  <p id="co-sub">あなたのキャンバスが完成しました</p>
  <div id="canvas-preview-wrap">
    <canvas id="canvas-preview"></canvas>
    <div id="preview-gen">生成中...</div>
  </div>
  <div class="co-row">
    <button class="co-btn" id="co-dl">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      画像を保存
    </button>
    <button class="co-btn x-btn" id="co-x">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X でシェア
    </button>
    <button class="co-btn ig-btn" id="co-ig">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </button>
  </div>
  <div id="co-msg"></div>
</div>

<div id="mode-flash"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════ THREE PARTICLES ═══════════════════════
(function(){
  const cv=document.getElementById('three-bg');
  const rdr=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
  rdr.setPixelRatio(Math.min(devicePixelRatio,2));rdr.setSize(innerWidth,innerHeight);rdr.setClearColor(0,0);
  const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,100);
  cam.position.z=6;
  const N=80,pos=new Float32Array(N*3),sz=new Float32Array(N),op=new Float32Array(N);
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*22;pos[i*3+1]=(Math.random()-.5)*14;pos[i*3+2]=(Math.random()-.5)*9;sz[i]=Math.random()*3.5+.8;op[i]=Math.random()*.32+.04;}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sz,1));
  geo.setAttribute('opacity',new THREE.BufferAttribute(op,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uM:{value:new THREE.Vector2()}},
    vertexShader:`attribute float size;attribute float opacity;varying float vO;uniform float uT;uniform vec2 uM;void main(){vO=opacity;vec3 p=position;p.x+=sin(uT*.35+position.y*.55)*.18;p.y+=cos(uT*.28+position.x*.42)*.12;p.z+=sin(uT*.18+position.x*.3)*.09;p.x-=uM.x*(.6+position.z*.09);p.y+=uM.y*(.35+position.z*.06);vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=size*(280./-mv.z);gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`varying float vO;void main(){vec2 uv=gl_PointCoord-.5;if(length(uv)>.5)discard;float a=(0.5-length(uv))*2.*vO;gl_FragColor=vec4(.72,.63,.48,a);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(geo,mat));
  let mx=0,my=0,tx=0,ty=0;
  document.addEventListener('mousemove',e=>{tx=(e.clientX/innerWidth-.5)*2;ty=(e.clientY/innerHeight-.5)*2;});
  window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();rdr.setSize(innerWidth,innerHeight);});
  (function loop(t){requestAnimationFrame(loop);mat.uniforms.uT.value=t*.001;mx+=(tx-mx)*.05;my+=(ty-my)*.05;mat.uniforms.uM.value.set(mx,my);cam.position.x+=(tx*.28-cam.position.x)*.04;cam.position.y+=(-ty*.18-cam.position.y)*.04;rdr.render(scene,cam);})(0);
})();

// ═══════════════════════ CURSOR ═══════════════════════
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;cur.style.left=cx+'px';cur.style.top=cy+'px';});
(function lp(){rx+=(cx-rx)*.13;ry+=(cy-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lp);})();
document.addEventListener('mousedown',()=>ring.style.transform='translate(-50%,-50%) scale(.65)');
document.addEventListener('mouseup',()=>ring.style.transform='translate(-50%,-50%) scale(1)');

// ═══════════════════════ AUDIO ═══════════════════════
let actx=null,mGain,sOn=false;
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  mGain=actx.createGain();mGain.gain.value=0;mGain.connect(actx.destination);
  const rev=actx.createConvolver(),rl=actx.sampleRate*4,rb=actx.createBuffer(2,rl,actx.sampleRate);
  for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.8);}
  rev.buffer=rb;rev.connect(mGain);
  const nb=actx.sampleRate*2,nbuf=actx.createBuffer(1,nb,actx.sampleRate),nd=nbuf.getChannelData(0);
  for(let i=0;i<nb;i++)nd[i]=Math.random()*2-1;
  const ns=actx.createBufferSource();ns.buffer=nbuf;ns.loop=true;
  const nf=actx.createBiquadFilter();nf.type='lowpass';nf.frequency.value=260;nf.Q.value=.3;
  const ng=actx.createGain();ng.gain.value=.013;ns.connect(nf);nf.connect(ng);ng.connect(rev);ns.start();
  [48.5,73,97].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.007-i*.002;
    const lfo=actx.createOscillator(),lg=actx.createGain();lfo.type='sine';lfo.frequency.value=.04+i*.025;lg.gain.value=.003;
    lfo.connect(lg);lg.connect(g.gain);lfo.start();o.connect(g);g.connect(rev);o.start();
  });
  function bell(){if(!sOn)return;const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=[396,528,440,330,264][Math.floor(Math.random()*5)];g.gain.setValueAtTime(0,actx.currentTime);g.gain.linearRampToValueAtTime(.05,actx.currentTime+.018);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+4);o.connect(g);g.connect(rev);o.start();o.stop(actx.currentTime+5);setTimeout(bell,5000+Math.random()*9000);}
  setTimeout(bell,3000);
}
const sBtn=document.getElementById('snd-btn'),wbs=document.querySelectorAll('.wb'),sLbl=document.getElementById('snd-lbl');
sBtn.addEventListener('click',()=>{initAudio();sOn=!sOn;mGain.gain.cancelScheduledValues(actx.currentTime);mGain.gain.setValueAtTime(mGain.gain.value,actx.currentTime);mGain.gain.linearRampToValueAtTime(sOn?.75:0,actx.currentTime+1.8);wbs.forEach(b=>b.classList.toggle('m',!sOn));sLbl.textContent=sOn?'on':'sound';});

// ═══════════════════════ CONFIG ═══════════════════════
let CONFIG={artist:{name:'常闇',name_en:'tokoyami',tagline:'a quiet archive',twitter:'',instagram:''},works:[]};
async function loadConfig(){
  try{
    const r=await fetch('images.json');
    if(!r.ok)throw new Error();
    CONFIG=await r.json();
    document.title=`${CONFIG.artist.name} — canvas note`;
    document.getElementById('intro-name').textContent=CONFIG.artist.name;
    document.getElementById('intro-sub').textContent=`${CONFIG.artist.name_en} — ${CONFIG.artist.tagline}`;
    document.getElementById('hdr-name').textContent=CONFIG.artist.name;
    ['og:title','twitter:title'].forEach(n=>{const m=document.querySelector(`meta[property="${n}"],meta[name="${n}"]`);if(m)m.content=`${CONFIG.artist.name} — canvas note`;});
  }catch(e){console.warn('images.json not found');}
}

// ═══════════════════════ BOARD ═══════════════════════
const board=document.getElementById('board');
let portfolioItems=[];   // 常闇の作品 (portfolio mode only)
let visitorItems=[];     // 訪問者がアップした写真 (visitor mode only)
let zTop=10,dragging=null,dox=0,doy=0;
let currentMode='portfolio';
const ITEM_MIN_W=120,ITEM_MAX_W=280,ITEM_MAX_H=380;
// Size buckets for portfolio: more natural variation
const SIZE_BUCKETS=[120,150,180,220,260,280]; // S→XL

function scatterPos(i){
  const cols=3,cw=innerWidth/cols,ch=(innerHeight-130)/3;
  return{
    x:Math.round(cw*(i%cols)+cw*.1+Math.sin(i*2.7)*cw*.22),
    y:Math.round(ch*Math.floor(i/cols)+130+Math.cos(i*3.1)*ch*.18),
    r:(i%2?1:-1)*(6+i*3.8)%13
  };
}

function makeItem(work, pos, isPortfolio, imgSrc){
  const allCount=portfolioItems.length+visitorItems.length;
  // Portfolio: pick from size buckets with seeded variation for natural scatter
  // Visitor: similar random spread
  const bucketIdx=Math.abs(Math.round(Math.sin(allCount*7.3+1.2)*2.5+2.5))%SIZE_BUCKETS.length;
  const targetW=isPortfolio ? SIZE_BUCKETS[bucketIdx] : Math.round(ITEM_MIN_W+Math.random()*(ITEM_MAX_W-ITEM_MIN_W));

  const wrap=document.createElement('div');
  wrap.className='photo-item';
  wrap.dataset.portfolio=isPortfolio?'1':'0';
  wrap.style.cssText=`left:${pos.x}px;top:${pos.y}px;z-index:${zTop++};transform:rotate(${pos.r}deg);opacity:0;`;
  // In visitor mode, portfolio items are hidden from start
  if(isPortfolio && currentMode==='visitor') wrap.style.display='none';
  if(!isPortfolio && currentMode==='portfolio') wrap.style.display='none';

  const shell=document.createElement('div');
  shell.className='photo-shell';
  shell.style.cssText=`width:${targetW}px;height:${Math.round(targetW*.72)}px;overflow:hidden;`;

  const img=document.createElement('img');
  img.src = imgSrc || `images/${work.file}`;
  img.alt=work.title||'';
  img.style.cssText='width:100%;height:100%;object-fit:cover;object-position:center;display:block;';
  img.crossOrigin='anonymous';

  img.onload=()=>{
    const ratio=img.naturalHeight/img.naturalWidth;
    const W=targetW, H=Math.min(Math.round(W*ratio),ITEM_MAX_H);
    shell.style.width=W+'px'; shell.style.height=H+'px';
    addTapes(wrap,W,H);
  };
  img.onerror=()=>{shell.style.background='#d8d4cc';addTapes(wrap,targetW,Math.round(targetW*.72));};

  shell.appendChild(img);

  // Resize handle (visitor mode only)
  const resizeHandle=document.createElement('div');
  resizeHandle.className='resize-handle';
  wrap.appendChild(resizeHandle);

  wrap.appendChild(shell);
  board.appendChild(wrap);
  makeDrag(wrap);
  makeResizable(wrap, resizeHandle);

  if(isPortfolio) portfolioItems.push(wrap);
  else visitorItems.push(wrap);

  const delay=(portfolioItems.length+visitorItems.length)*100+350;
  setTimeout(()=>{
    wrap.style.transition='opacity .8s ease,transform .85s cubic-bezier(.23,1,.32,1)';
    wrap.style.opacity='1';
    wrap.style.transform=`rotate(${pos.r}deg) scale(1)`;
    setTimeout(()=>wrap.style.transition='',950);
  },delay);

  return wrap;
}

function addTapes(wrap,W,H){
  wrap.querySelectorAll('.tape').forEach(t=>t.remove());
  const n=Math.random()>.4?1:2;
  for(let t=0;t<n;t++){
    const tp=document.createElement('div');tp.className='tape';
    const tw=38+Math.random()*26,th=11+Math.random()*5,tr=-18+Math.random()*36;
    tp.style.cssText=t===0
      ?`width:${tw}px;height:${th}px;top:-${th*.5}px;left:${W*.2+Math.random()*W*.4}px;transform:rotate(${tr}deg);`
      :`width:${th}px;height:${tw}px;left:-${th*.5}px;top:${H*.2+Math.random()*H*.4}px;transform:rotate(${tr}deg);`;
    wrap.appendChild(tp);
  }
}

// ── SELECT (click to select, click outside to deselect) ──
let selectedItem=null;
function selectItem(el){
  if(selectedItem&&selectedItem!==el) selectedItem.classList.remove('selected');
  selectedItem=el;
  el.classList.add('selected');
  el.style.zIndex=zTop++;
}
function deselectAll(){
  if(selectedItem) selectedItem.classList.remove('selected');
  selectedItem=null;
}
board.addEventListener('mousedown',e=>{
  if(!e.target.closest('.photo-item')&&!e.target.classList.contains('resize-handle')) deselectAll();
});

// ── RESIZE ──
let resizing=null,resizeStartX=0,resizeStartY=0,resizeStartW=0,resizeStartH=0,resizeRatio=1;
const MIN_W=80, MAX_W=480;

function makeResizable(wrap, handle){
  handle.addEventListener('mousedown',e=>{
    e.stopPropagation();e.preventDefault();
    const shell=wrap.querySelector('.photo-shell');
    const img=wrap.querySelector('img');
    resizing=wrap;
    resizeStartX=e.clientX;resizeStartY=e.clientY;
    resizeStartW=shell.offsetWidth;resizeStartH=shell.offsetHeight;
    resizeRatio=img&&img.naturalWidth?img.naturalHeight/img.naturalWidth:resizeStartH/resizeStartW;
    wrap.style.zIndex=zTop++;
    document.body.style.cursor='se-resize';
  });
  handle.addEventListener('touchstart',e=>{
    e.stopPropagation();e.preventDefault();
    const t=e.touches[0];
    const shell=wrap.querySelector('.photo-shell');
    const img=wrap.querySelector('img');
    resizing=wrap;
    resizeStartX=t.clientX;resizeStartY=t.clientY;
    resizeStartW=shell.offsetWidth;resizeStartH=shell.offsetHeight;
    resizeRatio=img&&img.naturalWidth?img.naturalHeight/img.naturalWidth:resizeStartH/resizeStartW;
    wrap.style.zIndex=zTop++;
  },{passive:false});
}

document.addEventListener('mousemove',e=>{
  if(!resizing)return;
  const dx=e.clientX-resizeStartX;
  const newW=Math.min(MAX_W,Math.max(MIN_W,resizeStartW+dx));
  const newH=Math.round(newW*resizeRatio);
  const shell=resizing.querySelector('.photo-shell');
  shell.style.width=newW+'px';shell.style.height=newH+'px';
});
document.addEventListener('touchmove',e=>{
  if(!resizing)return;
  e.preventDefault();
  const dx=e.touches[0].clientX-resizeStartX;
  const newW=Math.min(MAX_W,Math.max(MIN_W,resizeStartW+dx));
  const newH=Math.round(newW*resizeRatio);
  const shell=resizing.querySelector('.photo-shell');
  shell.style.width=newW+'px';shell.style.height=newH+'px';
},{passive:false});
document.addEventListener('mouseup',e=>{
  if(resizing){resizing=null;document.body.style.cursor='';}
});
document.addEventListener('touchend',()=>{resizing=null;});

// ── DRAG ──
function makeDrag(el){
  el.addEventListener('mousedown',e=>{e.preventDefault();startDrag(el,e.clientX,e.clientY);});
  el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];startDrag(el,t.clientX,t.clientY);},{passive:false});
}
function startDrag(el,ex,ey){
  selectItem(el);
  dragging=el;const r=el.getBoundingClientRect();dox=ex-r.left;doy=ey-r.top;
  el.classList.add('dragging');el.style.zIndex=zTop++;
  ring.style.width='42px';ring.style.height='42px';ring.style.borderColor='rgba(184,160,122,.8)';
}
document.addEventListener('mousemove',e=>{if(dragging)moveEl(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();moveEl(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
function moveEl(ex,ey){
  const br=board.getBoundingClientRect();
  dragging.style.left=(ex-br.left-dox)+'px';
  dragging.style.top=(ey-br.top-doy)+'px';
}
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);
function endDrag(){
  if(!dragging)return;
  dragging.classList.remove('dragging');dragging=null;
  ring.style.width='28px';ring.style.height='28px';ring.style.borderColor='rgba(24,20,14,.28)';
}
board.addEventListener('mouseover',e=>{if(e.target.closest('.photo-item')){ring.style.width='40px';ring.style.height='40px';}});
board.addEventListener('mouseout',e=>{if(e.target.closest('.photo-item')&&!dragging){ring.style.width='28px';ring.style.height='28px';}});

// ═══════════════════════ MODE SWITCH ═══════════════════════
const flash=document.getElementById('mode-flash');

function switchMode(mode){
  if(mode===currentMode)return;
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{currentMode=mode;applyMode();flash.style.transition='opacity .4s';flash.style.opacity='0';},120);
}

function applyMode(){
  const isP=currentMode==='portfolio';
  document.getElementById('tab-portfolio').classList.toggle('active',isP);
  document.getElementById('tab-visitor').classList.toggle('active',!isP);

  // Show/hide items by mode
  portfolioItems.forEach(el=>el.style.display=isP?'':'none');
  visitorItems.forEach(el=>el.style.display=isP?'none':'');

  // Info text
  document.getElementById('info-text').textContent=isP
    ?'ドラッグして鑑賞する'
    :'写真を並べてキャンバスを完成させる';

  // NAV: portfolio mode shows reset only; visitor mode shows upload/restart/finish
  const hasV=visitorItems.length>0;
  document.getElementById('btn-reset').style.display=isP?'inline-block':'none';
  document.getElementById('btn-add-more').style.display=(!isP&&hasV)?'inline-block':'none';
  document.getElementById('sep-add').style.display=(!isP&&hasV)?'flex':'none';
  document.getElementById('btn-restart').style.display=(!isP&&hasV)?'inline-block':'none';
  document.getElementById('sep-restart').style.display=(!isP&&hasV)?'flex':'none';
  document.getElementById('btn-finish').style.display=(!isP&&hasV)?'inline-block':'none';

  // If switching to visitor with no photos → show drop overlay
  if(!isP&&!hasV) document.getElementById('drop-overlay').classList.add('active');
  deselectAll();
}

document.getElementById('tab-portfolio').addEventListener('click',()=>switchMode('portfolio'));
document.getElementById('tab-visitor').addEventListener('click',()=>switchMode('visitor'));

// ═══════════════════════ UPLOAD ═══════════════════════
const fileInput=document.getElementById('file-input');
const dropOverlay=document.getElementById('drop-overlay');

dropOverlay.addEventListener('click',()=>fileInput.click());

document.getElementById('drop-close').addEventListener('click',e=>{
  e.stopPropagation();
  dropOverlay.classList.remove('active');
  if(visitorItems.length===0) switchMode('portfolio');
});

document.getElementById('btn-add-more').addEventListener('click',()=>fileInput.click());

fileInput.addEventListener('change',e=>{
  Array.from(e.target.files).forEach(loadFile);
  fileInput.value='';
});
board.addEventListener('dragover',e=>{e.preventDefault();if(currentMode==='visitor')dropOverlay.classList.add('active');});
board.addEventListener('dragleave',e=>{if(!board.contains(e.relatedTarget))dropOverlay.classList.remove('active');});
board.addEventListener('drop',e=>{
  e.preventDefault();dropOverlay.classList.remove('active');
  if(currentMode!=='visitor')return;
  Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).forEach(loadFile);
});

function loadFile(file){
  dropOverlay.classList.remove('active');
  const reader=new FileReader();
  reader.onload=ev=>{
    const pos=scatterPos(visitorItems.length);
    makeItem({title:file.name.replace(/\.[^.]+$/,''),year:''},pos,false,ev.target.result);
    // Show visitor nav buttons
    const ids=['btn-add-more','sep-add','btn-restart','sep-restart','btn-finish'];
    ids.forEach(id=>document.getElementById(id).style.display=id.startsWith('sep')?'flex':'inline-block');
  };
  reader.readAsDataURL(file);
}

// ── RESTART ──
document.getElementById('btn-restart').addEventListener('click',()=>{
  visitorItems.forEach(el=>el.remove());
  visitorItems=[];
  ['btn-add-more','sep-add','btn-restart','sep-restart','btn-finish'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.getElementById('drop-overlay').classList.add('active');
});

// ── RESET (portfolio) ──
document.getElementById('btn-reset').addEventListener('click',()=>{
  portfolioItems.forEach((el,i)=>{
    const s=scatterPos(i);
    el.style.transition='left .65s cubic-bezier(.23,1,.32,1),top .65s,transform .65s';
    el.style.left=s.x+'px';el.style.top=s.y+'px';el.style.transform=`rotate(${s.r}deg)`;
    setTimeout(()=>el.style.transition='',750);
  });
});

// ═══════════════════════ FINISH — render canvas ═══════════════════════
document.getElementById('btn-finish').addEventListener('click',openComplete);
document.getElementById('complete-close').addEventListener('click',()=>{
  document.getElementById('complete-overlay').classList.remove('open');
});

async function openComplete(){
  if(visitorItems.length===0)return;
  const overlay=document.getElementById('complete-overlay');
  overlay.classList.add('open');
  const genEl=document.getElementById('preview-gen');
  genEl.style.display='flex';

  const previewCv=document.getElementById('canvas-preview');
  const bw=board.offsetWidth, bh=board.offsetHeight;
  // High-res: 3x device pixel ratio, minimum 3000px wide for retina/print quality
  const DPR=Math.min(Math.max(window.devicePixelRatio||1,2),3); // 2x min, 3x max
  const scale=DPR;
  previewCv.width=Math.round(bw*scale);
  previewCv.height=Math.round(bh*scale);
  const ctx=previewCv.getContext('2d');

  // Background
  ctx.fillStyle='#f6f2ec';
  ctx.fillRect(0,0,previewCv.width,previewCv.height);

  // Grain
  for(let i=0;i<8000;i++){
    ctx.fillStyle=`rgba(24,20,14,${Math.random()*.042})`;
    ctx.fillRect(Math.random()*previewCv.width,Math.random()*previewCv.height,1,1);
  }

  const br=board.getBoundingClientRect();

  // Draw visitor items sorted by z-index (lowest first)
  const sorted=[...visitorItems].sort((a,b)=>parseInt(a.style.zIndex||0)-parseInt(b.style.zIndex||0));

  const draws=sorted.map(wrap=>new Promise(resolve=>{
    const img=wrap.querySelector('img');
    const shell=wrap.querySelector('.photo-shell');
    if(!img||!shell){resolve();return;}

    const wr=wrap.getBoundingClientRect();
    const sr=shell.getBoundingClientRect();
    const wCx=(wr.left+wr.right)/2-br.left;
    const wCy=(wr.top+wr.bottom)/2-br.top;
    const tStr=wrap.style.transform||'';
    const rotM=tStr.match(/rotate\(([-\d.]+)deg\)/);
    const rot=rotM?parseFloat(rotM[1])*Math.PI/180:0;
    const sw=sr.width, sh=sr.height;
    const sCx=(sr.left+sr.right)/2-br.left;
    const sCy=(sr.top+sr.bottom)/2-br.top;

    function draw(){
      ctx.save();
      ctx.scale(scale,scale);
      ctx.translate(wCx,wCy);
      ctx.rotate(rot);
      const ox=sCx-wCx, oy=sCy-wCy;

      // Tape strips
      wrap.querySelectorAll('.tape').forEach(tape=>{
        const tr2=tape.getBoundingClientRect();
        const ts=window.getComputedStyle(tape).transform;
        let tRot=0;
        if(ts&&ts!=='none'){const m2=ts.match(/matrix\(([-\d.e]+),([-\d.e]+)/);if(m2)tRot=Math.atan2(parseFloat(m2[2]),parseFloat(m2[1]));}
        const txc=(tr2.left+tr2.right)/2-br.left-wCx;
        const tyc=(tr2.top+tr2.bottom)/2-br.top-wCy;
        ctx.save();ctx.translate(txc,tyc);ctx.rotate(tRot);
        ctx.fillStyle='rgba(210,192,158,.42)';
        ctx.fillRect(-tr2.width/2,-tr2.height/2,tr2.width,tr2.height);
        ctx.restore();
      });

      // Photo frame shadow + background
      ctx.shadowColor='rgba(24,20,14,.18)';ctx.shadowBlur=20;ctx.shadowOffsetY=7;
      ctx.fillStyle='#f0ece4';
      ctx.fillRect(ox-sw/2,oy-sh/2,sw,sh);
      ctx.shadowColor='transparent';

      // Clip & draw photo with cover fit
      ctx.save();
      ctx.beginPath();ctx.rect(ox-sw/2,oy-sh/2,sw,sh);ctx.clip();
      ctx.filter='saturate(0.74) contrast(0.93) brightness(1.07)';
      const nw=img.naturalWidth||sw, nh=img.naturalHeight||sh;
      const fsc=Math.max(sw/nw,sh/nh);
      const dw=nw*fsc, dh=nh*fsc;
      ctx.drawImage(img,ox-dw/2,oy-dh/2,dw,dh);
      ctx.filter='none';
      ctx.restore();
      ctx.restore();
      resolve();
    }

    if(img.complete&&img.naturalWidth>0) draw();
    else{img.onload=draw;img.onerror=resolve;}
  }));

  await Promise.all(draws);

  // Watermark
  const wm=`${CONFIG.artist.name} — canvas note`;
  ctx.font=`italic ${Math.round(12*scale)}px 'EB Garamond',serif`;
  ctx.fillStyle='rgba(154,148,142,.5)';
  ctx.textAlign='right';
  ctx.fillText(wm,previewCv.width-Math.round(14*scale),previewCv.height-Math.round(12*scale));

  genEl.style.display='none';

  // ── Share handlers ──
  const aName=CONFIG.artist.name;
  const twId=CONFIG.artist.twitter;

  document.getElementById('co-dl').onclick=()=>{
    const a=document.createElement('a');
    a.href=previewCv.toDataURL('image/png');
    a.download=`${aName}-canvas.png`;
    a.click();
    showCoMsg('保存しました');
  };

  document.getElementById('co-x').onclick=()=>{
    // Save image first, then open tweet
    const a=document.createElement('a');
    a.href=previewCv.toDataURL('image/png');
    a.download=`${aName}-canvas.png`;
    a.click();
    const txt=encodeURIComponent(`${aName} — canvas note で私だけのキャンバスを作りました`);
    const url=encodeURIComponent(location.href.split('?')[0]);
    const via=twId?`&via=${twId}`:'';
    setTimeout(()=>{
      window.open(`https://twitter.com/intent/tweet?text=${txt}&url=${url}${via}`,'_blank');
      showCoMsg('画像を保存しました。Xのポストに添付してください');
    },500);
  };

  document.getElementById('co-ig').onclick=()=>{
    const a=document.createElement('a');
    a.href=previewCv.toDataURL('image/png');
    a.download=`${aName}-canvas.png`;
    a.click();
    setTimeout(()=>{
      window.open('https://www.instagram.com/','_blank');
      showCoMsg('画像を保存しました。Instagramに投稿してください');
    },500);
  };
}

function showCoMsg(txt){
  const el=document.getElementById('co-msg');
  el.textContent=txt;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}

// ═══════════════════════ INIT ═══════════════════════
(async()=>{
  await loadConfig();
  CONFIG.works.forEach((work,i)=>makeItem(work,scatterPos(i),true,null));
  document.getElementById('loading').classList.add('gone');
})();

document.getElementById('i-enter').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('gone');
});
</script>
