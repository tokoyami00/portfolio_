<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>常闇 — canvas note</title>
<meta name="description" content="写真を並べて、あなただけのキャンバスをつくる">
<meta property="og:title" content="常闇 — canvas note">
<meta property="og:description" content="写真を並べて、あなただけのキャンバスをつくる">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.gstatic.com">
<!-- Preload images.json so config is ready instantly -->
<link rel="preload" href="images.json" as="fetch" crossorigin>
<!-- Performance hints -->
<meta http-equiv="x-dns-prefetch-control" content="on">
<link rel="preload" href="images.json" as="fetch" crossorigin>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f2ec;--bg2:#edeae2;
  --ink:#18140e;--ink2:#4a4540;--ink3:#9a948e;
  --gold:#b8a07a;--gold2:rgba(184,160,122,.28);
  --sh:rgba(24,20,14,.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:Georgia,'Times New Roman',serif;color:var(--ink);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:96px;mix-blend-mode:multiply;}

/* CURSOR */
#cur{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--ink);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;}
#cur-ring{position:fixed;width:26px;height:26px;border-radius:50%;border:1px solid rgba(24,20,14,.22);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s;}

/* MODE BAR */
#mode-bar{position:fixed;top:0;left:0;right:0;z-index:600;display:flex;justify-content:center;
  background:linear-gradient(to bottom,var(--bg) 60%,transparent);padding-top:16px;pointer-events:none;}
#mode-inner{display:flex;align-items:center;pointer-events:all;
  background:rgba(246,242,236,.93);border:1px solid var(--gold2);border-radius:26px;overflow:hidden;}
.mode-tab{font-size:11.5px;letter-spacing:.15em;color:var(--ink3);background:none;border:none;
  cursor:pointer;padding:7px 18px;border-radius:22px;transition:color .2s,background .2s;white-space:nowrap;}
.mode-tab.active{color:var(--ink);background:rgba(184,160,122,.18);}
.mode-sep{width:1px;height:13px;background:var(--gold2);flex-shrink:0;}

/* HEADER */
#hdr{position:fixed;top:62px;left:32px;z-index:500;pointer-events:none;}
#hdr-name{font-size:13px;letter-spacing:.2em;font-style:italic;color:var(--ink);opacity:.7;}
#hdr-sub{font-size:9px;letter-spacing:.3em;color:var(--ink3);margin-top:4px;}

/* SOUND */
#snd-btn{position:fixed;top:68px;right:28px;z-index:600;background:none;border:none;cursor:pointer;
  font-size:11px;letter-spacing:.14em;color:var(--ink3);display:flex;align-items:center;gap:6px;padding:3px;transition:color .2s;}
#snd-btn:hover{color:var(--ink2);}
#waves{display:flex;gap:2px;align-items:center;height:11px;}
.wb{width:2px;border-radius:1px;background:var(--gold);}
.wb.m{height:3px!important;animation:none!important;}
.wb.a1{height:4px;animation:w1 1.3s ease-in-out infinite;}
.wb.a2{height:7px;animation:w2 1.5s ease-in-out infinite;}
.wb.a3{height:5px;animation:w3 1.2s ease-in-out infinite;}
.wb.a4{height:8px;animation:w4 1.7s ease-in-out infinite;}
@keyframes w1{0%,100%{height:4px}50%{height:10px}}
@keyframes w2{0%,100%{height:7px}50%{height:3px}}
@keyframes w3{0%,100%{height:5px}50%{height:11px}}
@keyframes w4{0%,100%{height:8px}50%{height:3px}}

/* BOARD */
#board{position:fixed;inset:0;z-index:10;overflow:hidden;cursor:none;}

/* PHOTO ITEM */
.photo-item{position:absolute;cursor:none;user-select:none;transform-origin:center;will-change:transform;}
.photo-shell{position:relative;background:#ede9e1;overflow:hidden;
  box-shadow:0 4px 18px var(--sh),0 1px 2px rgba(24,20,14,.05);transition:box-shadow .22s;}
.photo-item:hover .photo-shell{box-shadow:0 12px 40px var(--sh);}
.photo-item.dragging .photo-shell{box-shadow:0 22px 56px rgba(24,20,14,.18);}
/* placeholder bg shown while image loads */
.photo-shell::before{content:'';position:absolute;inset:0;background:var(--bg2);}
.photo-shell img{display:block;width:100%;height:100%;object-fit:cover;object-position:center;
  filter:saturate(.68) contrast(.92) brightness(1.06);transition:filter .28s,opacity .4s;
  position:relative;z-index:1;opacity:0;}
.photo-shell img.loaded{opacity:1;}
.photo-item:hover .photo-shell img{filter:saturate(.78) contrast(.95) brightness(1.09);}
.tape{position:absolute;pointer-events:none;background:rgba(210,192,158,.34);}

/* selected */
.photo-item.selected .photo-shell{outline:1.5px solid rgba(184,160,122,.6);outline-offset:3px;}
.resize-handle{position:absolute;bottom:-6px;right:-6px;width:17px;height:17px;
  border-radius:50%;background:var(--ink);cursor:se-resize;z-index:20;
  opacity:0;transition:opacity .18s;pointer-events:none;}
.photo-item.selected .resize-handle{opacity:.68;pointer-events:all;}
.resize-handle:hover{opacity:1!important;}

/* thumb bar */
#thumb-bar{position:fixed;bottom:72px;left:0;right:0;z-index:400;
  padding:8px 14px 6px;
  background:linear-gradient(to top,rgba(246,242,236,.98) 65%,transparent);
  transform:translateY(0);transition:transform .32s cubic-bezier(.23,1,.32,1);}
#thumb-bar.hidden{transform:translateY(calc(100% + 72px));}
#thumb-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:var(--gold2) transparent;}
#thumb-scroll::-webkit-scrollbar{height:3px;}
#thumb-scroll::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px;}
.thumb{flex-shrink:0;width:64px;height:64px;border-radius:2px;overflow:hidden;
  cursor:pointer;position:relative;border:2px solid transparent;
  transition:border-color .15s,transform .15s,opacity .15s;opacity:.62;}
.thumb:hover{opacity:.92;transform:translateY(-2px);}
.thumb.active{border-color:var(--ink);opacity:1;}
.thumb.highlight{border-color:var(--gold);opacity:1;transform:translateY(-3px) scale(1.04);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.6);}
.thumb.active img{filter:saturate(.78);}
.thumb-chk{position:absolute;top:3px;right:3px;width:14px;height:14px;
  border-radius:50%;background:var(--ink);display:none;align-items:center;justify-content:center;}
.thumb.active .thumb-chk{display:flex;}
.thumb-chk::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);}
#thumb-controls{display:flex;align-items:center;gap:10px;padding:5px 2px 0;flex-wrap:wrap;}
#thumb-label{font-size:9.5px;letter-spacing:.2em;color:var(--ink3);}
.tc-btn{font-size:10.5px;letter-spacing:.1em;color:var(--ink3);background:none;border:none;cursor:pointer;padding:1px 4px;transition:color .18s;}
.tc-btn:hover{color:var(--ink);}
#thumb-sep{width:1px;height:11px;background:var(--gold2);}
#thumb-count{font-size:9.5px;letter-spacing:.1em;color:var(--gold);margin-left:auto;}

/* drop overlay */
#drop-overlay{position:fixed;inset:0;z-index:700;
  border:2px dashed rgba(184,160,122,.38);background:rgba(246,242,236,.82);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
  opacity:0;pointer-events:none;transition:opacity .28s;cursor:pointer;}
#drop-overlay.active{opacity:1;pointer-events:all;}
#drop-overlay p{font-size:20px;font-style:italic;letter-spacing:.1em;color:var(--ink2);}
#drop-overlay small{font-size:10px;letter-spacing:.26em;color:var(--ink3);}
#drop-close{position:absolute;top:24px;right:28px;background:none;border:none;
  cursor:pointer;font-size:22px;color:var(--ink3);transition:color .18s;line-height:1;pointer-events:all;}
#drop-close:hover{color:var(--ink);}
#file-input{display:none;}

/* NAV */
#nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;
  display:flex;align-items:center;
  background:rgba(246,242,236,.93);border:1px solid var(--gold2);border-radius:26px;overflow:hidden;}
.nav-btn{font-size:11px;letter-spacing:.13em;color:var(--ink3);background:none;border:none;
  cursor:pointer;padding:8px 18px;transition:color .18s,background .18s;white-space:nowrap;}
.nav-btn:hover{color:var(--ink);background:rgba(184,160,122,.08);}
.nav-btn.finish{color:var(--ink2);}
.nav-btn.finish:hover{color:var(--ink);background:rgba(184,160,122,.14);}
.nav-sep{width:1px;background:var(--gold2);align-self:stretch;}

/* info */
#info-line{position:fixed;bottom:20px;left:28px;z-index:500;
  font-size:9px;letter-spacing:.24em;color:var(--ink3);pointer-events:none;}

/* COMPLETE OVERLAY */
#complete-overlay{position:fixed;inset:0;z-index:800;
  background:rgba(246,242,236,.96);backdrop-filter:blur(18px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .45s;overflow-y:auto;padding:52px 18px 32px;}
#complete-overlay.open{opacity:1;pointer-events:all;}
#complete-overlay h1{font-size:44px;font-weight:400;font-style:italic;letter-spacing:.1em;color:var(--ink);}
#co-sub{font-size:9.5px;letter-spacing:.3em;color:var(--ink3);}
#canvas-preview-wrap{position:relative;width:min(620px,88vw);}
#canvas-preview{display:block;width:100%;box-shadow:0 8px 40px rgba(24,20,14,.15);}
#preview-gen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(246,242,236,.78);font-size:9.5px;letter-spacing:.26em;color:var(--ink3);}
.co-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.co-btn{font-size:11.5px;letter-spacing:.1em;color:var(--ink2);background:none;
  border:1px solid rgba(184,160,122,.38);border-radius:3px;
  padding:8px 16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;}
.co-btn:hover{background:var(--bg2);color:var(--ink);}
.co-btn.x-btn:hover{background:#000;color:#fff;border-color:#000;}
.co-btn.ig-btn:hover{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border-color:transparent;}
#co-msg{font-size:9.5px;letter-spacing:.26em;color:var(--gold);min-height:14px;opacity:0;transition:opacity .28s;text-align:center;}
#co-msg.show{opacity:1;}
#complete-close{position:absolute;top:24px;right:28px;background:none;border:none;
  cursor:pointer;font-size:24px;color:var(--ink3);transition:color .18s;line-height:1;}
#complete-close:hover{color:var(--ink);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.1s,visibility 1.1s;}
#intro.gone{opacity:0;visibility:hidden;}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.i-name{font-size:50px;font-weight:400;font-style:italic;letter-spacing:.12em;color:var(--ink);
  opacity:0;animation:rise 1.4s .2s cubic-bezier(.23,1,.32,1) forwards;}
.i-sub{font-size:9.5px;letter-spacing:.36em;color:var(--ink3);margin-top:11px;
  opacity:0;animation:rise 1.4s .65s cubic-bezier(.23,1,.32,1) forwards;}
.i-line{width:32px;height:1px;background:var(--gold2);margin:22px auto;
  opacity:0;animation:rise 1.4s .95s cubic-bezier(.23,1,.32,1) forwards;}
.i-enter{font-size:11.5px;letter-spacing:.18em;color:var(--ink3);
  background:none;border:1px solid var(--gold2);border-radius:2px;padding:8px 28px;
  cursor:pointer;transition:all .22s;
  opacity:0;animation:rise 1.4s 1.35s cubic-bezier(.23,1,.32,1) forwards;}
.i-enter:hover{color:var(--ink);border-color:var(--gold);background:var(--bg2);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:1100;background:var(--bg);
  display:flex;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s;}
#loading.gone{opacity:0;visibility:hidden;}
#loading-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.65)}50%{opacity:1;transform:scale(1)}}
#mode-flash{position:fixed;inset:0;z-index:750;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .28s;}
</style>
</head>
<body>
<div id="loading"><div id="loading-dot"></div></div>
<div id="cur"></div><div id="cur-ring"></div>

<div id="intro">
  <div class="i-name" id="intro-name">常闇</div>
  <div class="i-sub"  id="intro-sub">a quiet archive</div>
  <div class="i-line"></div>
  <button class="i-enter" id="i-enter">enter</button>
</div>

<div id="mode-bar">
  <div id="mode-inner">
    <button class="mode-tab active" id="tab-portfolio">常闇の作品</button>
    <div class="mode-sep"></div>
    <button class="mode-tab" id="tab-visitor">あなたのキャンバス</button>
  </div>
</div>

<div id="hdr"><div id="hdr-name">常闇</div><div id="hdr-sub">canvas note</div></div>

<button id="snd-btn">
  <div id="waves"><div class="wb a1 m"></div><div class="wb a2 m"></div><div class="wb a3 m"></div><div class="wb a4 m"></div></div>
  <span id="snd-lbl">sound</span>
</button>

<div id="board"></div>

<!-- THUMBNAIL BAR -->
<div id="thumb-bar">
  <div id="thumb-scroll"></div>
  <div id="thumb-controls">
    <span id="thumb-label">表示する作品を選ぶ</span>
    <div id="thumb-sep"></div>
    <button class="tc-btn" id="thumb-all">すべて</button>
    <button class="tc-btn" id="thumb-none">なし</button>
    <button class="tc-btn" id="thumb-random">ランダム10</button>
    <div id="thumb-sep"></div>
    <button class="tc-btn" id="btn-shuffle-layout" title="重ならないようにランダム配置">⊞ 並べ直す</button>
    <span id="thumb-count"></span>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nav-btn" id="btn-reset">reset</button>
  <div class="nav-sep" id="sep-reset"></div>
  <button class="nav-btn" id="btn-add-more"  style="display:none">+ 写真を追加</button>
  <div class="nav-sep"    id="sep-add"        style="display:none"></div>
  <button class="nav-btn" id="btn-restart"    style="display:none">↩ 最初から</button>
  <div class="nav-sep"    id="sep-restart"    style="display:none"></div>
  <button class="nav-btn finish" id="btn-finish" style="display:none">完成する →</button>
</div>
<input type="file" id="file-input" accept="image/*" multiple>
<div id="info-line"><span id="info-text">ドラッグして鑑賞する</span></div>

<div id="drop-overlay">
  <button id="drop-close">×</button>
  <p>写真をドロップ</p>
  <small>または クリックして選択</small>
</div>

<div id="complete-overlay">
  <button id="complete-close">×</button>
  <h1>beautiful.</h1>
  <p id="co-sub">あなたのキャンバスが完成しました</p>
  <div id="canvas-preview-wrap">
    <canvas id="canvas-preview"></canvas>
    <div id="preview-gen">生成中...</div>
  </div>
  <div class="co-row">
    <button class="co-btn" id="co-dl">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      画像を保存
    </button>
    <button class="co-btn x-btn" id="co-x">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X でシェア
    </button>
    <button class="co-btn ig-btn" id="co-ig">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </button>
  </div>
  <div id="co-msg"></div>
</div>

<div id="mode-flash"></div>

<script>
'use strict';

// ═══ CONFIG ══════════════════════════════════════════════
let CFG = {artist:{name:'常闇',name_en:'tokoyami',tagline:'a quiet archive',twitter:'',instagram:''},works:[]};
const INITIAL_SHOW = 10; // 最初に表示する枚数
const SIZES = [115,145,170,205,245,270];
const ITEM_MAX_H = 340, MIN_W = 75, MAX_W = 450;

async function loadConfig(){
  try{
    const r = await fetch('images.json', {cache:'no-cache'});
    if(!r.ok) throw 0;
    CFG = await r.json();
    document.title = `${CFG.artist.name} — canvas note`;
    document.getElementById('intro-name').textContent = CFG.artist.name;
    document.getElementById('intro-sub').textContent  = `${CFG.artist.name_en} — ${CFG.artist.tagline}`;
    document.getElementById('hdr-name').textContent   = CFG.artist.name;
  } catch(e){ console.warn('images.json not found'); }
}

// ═══ CURSOR ══════════════════════════════════════════════
const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
let cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{cx=e.clientX;cy=e.clientY;cur.style.left=cx+'px';cur.style.top=cy+'px';});
(function lp(){rx+=(cx-rx)*.13;ry+=(cy-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lp);})();
document.addEventListener('mousedown',()=>ring.style.transform='translate(-50%,-50%) scale(.58)');
document.addEventListener('mouseup',  ()=>ring.style.transform='translate(-50%,-50%) scale(1)');

// ═══ AUDIO ═══════════════════════════════════════════════
let actx=null,mGain,sOn=false;
function initAudio(){
  if(actx) return;
  actx = new(window.AudioContext||window.webkitAudioContext)();
  mGain = actx.createGain(); mGain.gain.value=0; mGain.connect(actx.destination);
  const rev=actx.createConvolver(), rl=actx.sampleRate*3, rb=actx.createBuffer(2,rl,actx.sampleRate);
  for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.5);}
  rev.buffer=rb; rev.connect(mGain);
  const nb=actx.sampleRate,nbuf=actx.createBuffer(1,nb,actx.sampleRate),nd=nbuf.getChannelData(0);
  for(let i=0;i<nb;i++) nd[i]=Math.random()*2-1;
  const ns=actx.createBufferSource(); ns.buffer=nbuf; ns.loop=true;
  const nf=actx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=220;
  const ng=actx.createGain(); ng.gain.value=.01;
  ns.connect(nf); nf.connect(ng); ng.connect(rev); ns.start();
  [49,73,98].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.value=f; g.gain.value=.005-i*.0012;
    const lfo=actx.createOscillator(),lg=actx.createGain(); lfo.frequency.value=.04+i*.018; lg.gain.value=.0025;
    lfo.connect(lg); lg.connect(g.gain); lfo.start(); o.connect(g); g.connect(rev); o.start();
  });
  function bell(){
    if(!sOn) return;
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine'; o.frequency.value=[396,528,440,330][Math.floor(Math.random()*4)];
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(.04,actx.currentTime+.014);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+3);
    o.connect(g); g.connect(rev); o.start(); o.stop(actx.currentTime+4);
    setTimeout(bell,5000+Math.random()*8000);
  }
  setTimeout(bell,2500);
}
const sBtn=document.getElementById('snd-btn'),wbs=document.querySelectorAll('.wb'),sLbl=document.getElementById('snd-lbl');
sBtn.addEventListener('click',()=>{
  // Defer audio init to idle time so it doesn't block first interaction
  if('requestIdleCallback' in window) requestIdleCallback(initAudio);
  else setTimeout(initAudio,0);
  sOn=!sOn;
  if(!mGain) return; // audio not yet initialized
  mGain.gain.cancelScheduledValues(actx.currentTime);
  mGain.gain.setValueAtTime(mGain.gain.value,actx.currentTime);
  mGain.gain.linearRampToValueAtTime(sOn?.65:0,actx.currentTime+1.4);
  wbs.forEach(b=>b.classList.toggle('m',!sOn));
  sLbl.textContent = sOn?'on':'sound';
});

// ═══ BOARD ═══════════════════════════════════════════════
const board = document.getElementById('board');
// portfolioItems[i] = { wrap, work, visible, w, h }
let portfolioItems = [];
let visitorItems   = [];
let zTop=10, dragging=null, dox=0, doy=0;
let currentMode = 'portfolio';

// ─── Utility ─────────────────────────────────────────────
function rnd(min,max){ return Math.floor(Math.random()*(max-min))+min; }
function shuffle(arr){ return arr.slice().sort(()=>Math.random()-.5); }

// ─── No-overlap layout ───────────────────────────────────
// Grid-based placement with jitter — guarantees no overlap
function findFreePos(W, H, placed){
  const M = 24; // gap between photos
  const boardW = board.offsetWidth, boardH = board.offsetHeight;
  const TOP = 108, BOTTOM = boardH - 85;
  const rW = W + M, rH = H + M; // effective rect including margin

  for(let attempt = 0; attempt < 400; attempt++){
    const x = rnd(12, Math.max(13, boardW - W - 12));
    const y = rnd(TOP, Math.max(TOP + 1, BOTTOM - H));
    let ok = true;
    for(const p of placed){
      // AABB overlap test — note placed stores inflated rects
      if(x < p.x + p.w && x + rW > p.x &&
         y < p.y + p.h && y + rH > p.y){ ok = false; break; }
    }
    if(ok){ placed.push({x, y, w: rW, h: rH}); return {x, y}; }
  }
  // Fallback: grid
  const cols = Math.max(1, Math.floor((boardW - 24) / (W + M + 8)));
  const idx  = placed.length;
  const gx   = 12 + (idx % cols) * (W + M + 8);
  const gy   = TOP + Math.floor(idx / cols) * (H + M + 8);
  placed.push({x: gx, y: gy, w: rW, h: rH});
  return {x: Math.min(gx, boardW - W - 12), y: Math.min(gy, BOTTOM - H)};
}

// Get real W/H of a wrap element (after image has loaded, or estimate)
function getWH(wrap){
  const sh = wrap.querySelector('.photo-shell');
  if(!sh) return {w:160, h:120};
  const w = sh.offsetWidth  || parseInt(sh.style.width)  || 160;
  const h = sh.offsetHeight || parseInt(sh.style.height) || Math.round(w * .75);
  return {w, h};
}

// ─── Make photo item ─────────────────────────────────────
function makeItem(work, x, y, rot, isPortfolio, imgSrc){
  const idx = portfolioItems.length + visitorItems.length;
  const targetW = SIZES[Math.abs(Math.round(Math.sin(idx*6.7)*2.4+2.4))%SIZES.length];

  const wrap = document.createElement('div');
  wrap.className = 'photo-item';
  wrap.style.cssText = `left:${x}px;top:${y}px;z-index:${zTop++};transform:rotate(${rot}deg);opacity:0;`;

  const shell = document.createElement('div');
  shell.className = 'photo-shell';
  shell.style.cssText = `width:${targetW}px;height:${Math.round(targetW*.75)}px;`;

  // Lazy-load image: set data-src, load only when activated
  const img = document.createElement('img');
  img.dataset.src = imgSrc || `images/${work.file}`;
  img.alt = work.title||'';
  img.crossOrigin = 'anonymous';

  function loadImg(){
    if(img.src) return; // already loading
    img.src = img.dataset.src;
    img.onload = ()=>{
      img.classList.add('loaded');
      const ratio = img.naturalHeight/img.naturalWidth;
      const W = targetW, H = Math.min(Math.round(W*ratio), ITEM_MAX_H);
      shell.style.width = W+'px'; shell.style.height = H+'px';
      if(isPortfolio){
        const entry = portfolioItems.find(p=>p.wrap===wrap);
        if(entry){ entry.w=W; entry.h=H; }
      }
      addTapes(wrap,W,H);
    };
    img.onerror = ()=>{ shell.style.background='#d8d4cc'; img.classList.add('loaded'); };
  }
  wrap._loadImg = loadImg;

  shell.appendChild(img);
  const rh = document.createElement('div'); rh.className='resize-handle';
  wrap.appendChild(rh); wrap.appendChild(shell);
  board.appendChild(wrap);
  makeDrag(wrap); makeResizable(wrap,rh);

  if(isPortfolio) portfolioItems.push({wrap,work,visible:false,w:targetW,h:Math.round(targetW*.75)});
  else visitorItems.push(wrap);

  return wrap;
}

function activateItem(wrap, delay=0){
  setTimeout(()=>{
    wrap._loadImg && wrap._loadImg();
    wrap.style.transition='opacity .6s ease,transform .7s cubic-bezier(.23,1,.32,1)';
    wrap.style.opacity='1';
    const rot = parseFloat((wrap.style.transform||'').replace(/[^0-9.\-]/g,''))||0;
    wrap.style.transform=`rotate(${rot}deg) scale(1)`;
    setTimeout(()=>wrap.style.transition='',780);
  }, delay);
}

function addTapes(wrap,W,H){
  wrap.querySelectorAll('.tape').forEach(t=>t.remove());
  const n = Math.random()>.42?1:2;
  for(let t=0;t<n;t++){
    const tp=document.createElement('div'); tp.className='tape';
    const tw=34+Math.random()*22,th=9+Math.random()*5,tr=-15+Math.random()*30;
    tp.style.cssText = t===0
      ?`width:${tw}px;height:${th}px;top:-${th*.5}px;left:${W*.2+Math.random()*W*.4}px;transform:rotate(${tr}deg);`
      :`width:${th}px;height:${tw}px;left:-${th*.5}px;top:${H*.2+Math.random()*H*.4}px;transform:rotate(${tr}deg);`;
    wrap.appendChild(tp);
  }
}

// ─── THUMBNAIL BAR ───────────────────────────────────────
const thumbScroll = document.getElementById('thumb-scroll');

function buildThumbBar(){
  thumbScroll.innerHTML='';
  portfolioItems.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='thumb'; div.dataset.idx=i;
    const img=document.createElement('img');
    img.src=`images/${item.work.file}`; img.loading='lazy'; img.alt='';
    const chk=document.createElement('div'); chk.className='thumb-chk';
    div.appendChild(img); div.appendChild(chk);
    div.addEventListener('click',()=>thumbToggle(i));
    thumbScroll.appendChild(div);
  });
  updateThumbCount();
}

function thumbToggle(idx, forceState){
  const item = portfolioItems[idx];
  const div  = thumbScroll.children[idx];
  if(!div) return;
  const newVisible = forceState !== undefined ? forceState : !item.visible;
  if(newVisible === item.visible) return;
  item.visible = newVisible;
  div.classList.toggle('active', newVisible);
  if(newVisible){
    item.wrap.style.display = '';
    item.wrap._loadImg && item.wrap._loadImg();
    // Re-place to avoid overlap with currently visible items
    const placed = portfolioItems
      .filter(p => p.visible && p !== item)
      .map(p => { const {w,h} = getWH(p.wrap); return {x: parseFloat(p.wrap.style.left)||0, y: parseFloat(p.wrap.style.top)||0, w, h}; });
    function doPlace(){
      const {w: W, h: H} = getWH(item.wrap);
      const pos = findFreePos(W, H, placed);
      const rot = (Math.random() - .5) * 16;
      item.wrap.style.left      = pos.x + 'px';
      item.wrap.style.top       = pos.y + 'px';
      item.wrap.style.transform = `rotate(${rot}deg)`;
      item.wrap.style.zIndex    = zTop++;
      item.wrap.style.transition = 'opacity .6s ease, transform .7s cubic-bezier(.23,1,.32,1)';
      item.wrap.style.opacity   = '1';
      setTimeout(() => item.wrap.style.transition = '', 780);
    }
    const img = item.wrap.querySelector('img');
    if(img && img.complete && img.naturalWidth > 0) doPlace();
    else if(img){ const prev=img.onload; img.onload=function(){if(prev)prev.call(this);doPlace();}; if(!img.src&&img.dataset.src)img.src=img.dataset.src; }
    else doPlace();
  } else {
    item.wrap.style.transition = 'opacity .3s ease';
    item.wrap.style.opacity = '0';
    setTimeout(() => {
      item.wrap.style.display = 'none';
      item.wrap.style.transition = '';
    }, 320);
  }
  updateThumbCount();
}

function updateThumbCount(){
  const n = portfolioItems.filter(x=>x.visible).length;
  document.getElementById('thumb-count').textContent = `${n} / ${portfolioItems.length}`;
}

// Show random INITIAL_SHOW items with staggered animation + thumb highlight
function showRandomInitial(){
  const indices = shuffle(portfolioItems.map((_,i)=>i)).slice(0, INITIAL_SHOW);
  const placed  = [];

  // Pre-compute positions using known targetW (don't wait for image load)
  const moves = indices.map(idx => {
    const item = portfolioItems[idx];
    const W = item.w, H = item.h; // initial estimate (updated after load)
    const pos = findFreePos(W, H, placed);
    const rot = (Math.random() - .5) * 16;
    return {idx, item, pos, rot};
  });

  moves.forEach(({idx, item, pos, rot}, i) => {
    setTimeout(() => {
      // Highlight thumb
      const div = thumbScroll.children[idx];
      if(div){
        div.classList.add('highlight');
        setTimeout(() => { div.classList.remove('highlight'); div.classList.add('active'); }, 340);
      }
      // Position and show
      item.visible          = true;
      item.wrap.style.display    = '';
      item.wrap.style.left       = pos.x + 'px';
      item.wrap.style.top        = pos.y + 'px';
      item.wrap.style.transform  = `rotate(${rot}deg)`;
      item.wrap.style.zIndex     = zTop++;
      item.wrap.style.transition = 'opacity .55s ease, transform .65s cubic-bezier(.23,1,.32,1)';
      item.wrap.style.opacity    = '1';
      setTimeout(() => item.wrap.style.transition = '', 700);
      // Start loading image
      item.wrap._loadImg && item.wrap._loadImg();
    }, i * 150);
  });
  updateThumbCount();
}


// ─── "並べ直す" button: non-overlapping random layout ────
function shuffleLayout(items){
  // Shuffle order first so arrangement differs each time
  const wraps = shuffle(
    items.map(item => item && item.wrap ? item.wrap : item)
  ).filter(w => w && w.style.display !== 'none');

  // Collect all positions up front (no stagger in findFreePos loop)
  const placed = [];
  const moves  = wraps.map(wrap => {
    const {w: W, h: H} = getWH(wrap);
    const pos = findFreePos(W, H, placed);
    return {wrap, pos, rot: (Math.random() - .5) * 16};
  });

  // Apply with stagger animation
  moves.forEach(({wrap, pos, rot}, i) => {
    setTimeout(() => {
      wrap.style.transition = 'left .48s cubic-bezier(.23,1,.32,1),top .48s,transform .48s';
      wrap.style.left      = pos.x + 'px';
      wrap.style.top       = pos.y + 'px';
      wrap.style.transform = `rotate(${rot}deg)`;
      wrap.style.zIndex    = zTop++;
      setTimeout(() => wrap.style.transition = '', 520);
    }, i * 50);
  });
}

document.getElementById('btn-shuffle-layout').addEventListener('click',()=>{
  shuffleLayout(portfolioItems.filter(x=>x.visible));
});

// All / None / Random10
document.getElementById('thumb-all').addEventListener('click',()=>{
  portfolioItems.forEach((_,i)=>thumbToggle(i,true));
});
document.getElementById('thumb-none').addEventListener('click',()=>{
  portfolioItems.forEach((_,i)=>thumbToggle(i,false));
});
document.getElementById('thumb-random').addEventListener('click',()=>{
  portfolioItems.forEach((_,i)=>thumbToggle(i,false));
  setTimeout(()=>{
    const indices = shuffle(portfolioItems.map((_,i)=>i)).slice(0,INITIAL_SHOW);
    indices.forEach((idx,i)=>setTimeout(()=>{
      const div=thumbScroll.children[idx];
      if(div){div.classList.add('highlight');setTimeout(()=>{div.classList.remove('highlight');},400);}
      thumbToggle(idx,true);
    },i*140));
  },80);
});

// ─── SELECT & RESIZE ─────────────────────────────────────
let selectedItem=null;
function selectItem(el){if(selectedItem&&selectedItem!==el)selectedItem.classList.remove('selected');selectedItem=el;el.classList.add('selected');el.style.zIndex=zTop++;}
function deselectAll(){if(selectedItem){selectedItem.classList.remove('selected');selectedItem=null;}}
board.addEventListener('mousedown',e=>{if(!e.target.closest('.photo-item')&&!e.target.classList.contains('resize-handle'))deselectAll();});

let resizing=null,rsX=0,rsW=0,rsH=0,rsRatio=1;
function makeResizable(wrap,handle){
  function start(ex){
    const sh=wrap.querySelector('.photo-shell'),im=wrap.querySelector('img');
    resizing=wrap;rsX=ex;rsW=sh.offsetWidth;rsH=sh.offsetHeight;
    rsRatio=im&&im.naturalWidth?im.naturalHeight/im.naturalWidth:rsH/rsW;
    wrap.style.zIndex=zTop++;document.body.style.cursor='se-resize';
  }
  handle.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();start(e.clientX);});
  handle.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();start(e.touches[0].clientX);},{passive:false});
}
function applyResize(ex){
  const nW=Math.min(MAX_W,Math.max(MIN_W,rsW+(ex-rsX)));
  const nH=Math.round(nW*rsRatio);
  const sh=resizing.querySelector('.photo-shell');
  sh.style.width=nW+'px';sh.style.height=nH+'px';
  addTapes(resizing,nW,nH);
}
document.addEventListener('mousemove',e=>{if(resizing)applyResize(e.clientX);});
document.addEventListener('touchmove',e=>{if(resizing){e.preventDefault();applyResize(e.touches[0].clientX);}},{passive:false});
document.addEventListener('mouseup',()=>{if(resizing){resizing=null;document.body.style.cursor='';}});
document.addEventListener('touchend',()=>{resizing=null;});

// ─── DRAG ────────────────────────────────────────────────
function makeDrag(el){
  el.addEventListener('mousedown',e=>{e.preventDefault();selectItem(el);startDrag(el,e.clientX,e.clientY);});
  el.addEventListener('touchstart',e=>{e.preventDefault();selectItem(el);startDrag(el,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}
function startDrag(el,ex,ey){
  dragging=el;const r=el.getBoundingClientRect();dox=ex-r.left;doy=ey-r.top;
  el.classList.add('dragging');el.style.zIndex=zTop++;
  ring.style.width='38px';ring.style.height='38px';ring.style.borderColor='rgba(184,160,122,.7)';
}
document.addEventListener('mousemove',e=>{if(dragging)moveEl(e.clientX,e.clientY);});
document.addEventListener('touchmove',e=>{if(dragging){e.preventDefault();moveEl(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
function moveEl(ex,ey){
  const br=board.getBoundingClientRect();
  dragging.style.left=(ex-br.left-dox)+'px';
  dragging.style.top=(ey-br.top-doy)+'px';
}
document.addEventListener('mouseup',endDrag); document.addEventListener('touchend',endDrag);
function endDrag(){if(!dragging)return;dragging.classList.remove('dragging');dragging=null;ring.style.width='26px';ring.style.height='26px';ring.style.borderColor='rgba(24,20,14,.22)';}
board.addEventListener('mouseover',e=>{if(e.target.closest('.photo-item')){ring.style.width='36px';ring.style.height='36px';}});
board.addEventListener('mouseout', e=>{if(e.target.closest('.photo-item')&&!dragging){ring.style.width='26px';ring.style.height='26px';}});

// ═══ MODE SWITCH ═════════════════════════════════════════
const flash=document.getElementById('mode-flash');
function switchMode(mode){
  if(mode===currentMode) return;
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{currentMode=mode;applyMode();flash.style.transition='opacity .28s';flash.style.opacity='0';},100);
}
function applyMode(){
  const isP = currentMode==='portfolio';
  document.getElementById('tab-portfolio').classList.toggle('active',isP);
  document.getElementById('tab-visitor').classList.toggle('active',!isP);
  portfolioItems.forEach(item=>item.wrap.style.display=(!isP||!item.visible)?'none':'');
  visitorItems.forEach(el=>el.style.display=isP?'none':'');
  document.getElementById('thumb-bar').classList.toggle('hidden',!isP);
  document.getElementById('info-text').textContent = isP?'ドラッグして鑑賞する':'写真を並べてキャンバスを完成させる';
  const hasV=visitorItems.length>0;
  document.getElementById('btn-reset').style.display    = isP?'inline-block':'none';
  document.getElementById('sep-reset').style.display    = isP?'flex':'none';
  document.getElementById('btn-add-more').style.display = (!isP&&hasV)?'inline-block':'none';
  document.getElementById('sep-add').style.display      = (!isP&&hasV)?'flex':'none';
  document.getElementById('btn-restart').style.display  = (!isP&&hasV)?'inline-block':'none';
  document.getElementById('sep-restart').style.display  = (!isP&&hasV)?'flex':'none';
  document.getElementById('btn-finish').style.display   = (!isP&&hasV)?'inline-block':'none';
  if(!isP&&!hasV) document.getElementById('drop-overlay').classList.add('active');
  deselectAll();
}
document.getElementById('tab-portfolio').addEventListener('click',()=>switchMode('portfolio'));
document.getElementById('tab-visitor').addEventListener('click',()=>switchMode('visitor'));

// ─── RESET (portfolio) ───────────────────────────────────
document.getElemdocument.getElementById('btn-reset').addEventListener('click',()=>{
  shuffleLayout(portfolioItems.filter(x=>x.visible));
});
// ═══ UPLOAD ══════════════════════════════════════════════
const fileInput=document.getElementById('file-input'), dropOverlay=document.getElementById('drop-overlay');
dropOverlay.addEventListener('click',()=>fileInput.click());
document.getElementById('drop-close').addEventListener('click',e=>{
  e.stopPropagation();dropOverlay.classList.remove('active');
  if(visitorItems.length===0) switchMode('portfolio');
});
document.getElementById('btn-add-more').addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{Array.from(e.target.files).forEach(loadFile);fileInput.value='';});
board.addEventListener('dragover',e=>{e.preventDefault();if(currentMode==='visitor')dropOverlay.classList.add('active');});
board.addEventListener('dragleave',e=>{if(!board.contains(e.relatedTarget))dropOverlay.classList.remove('active');});
board.addEventListener('drop',e=>{
  e.preventDefault();dropOverlay.classList.remove('active');
  if(currentMode!=='visitor') return;
  Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).forEach(loadFile);
});
function loadFile(file){
  dropOverlay.classList.remove('active');
  const reader=new FileReader();
  reader.onload=ev=>{
    const placed=visitorItems.map(el=>{const s=el.querySelector('.photo-shell');return{x:parseFloat(el.style.left)||0,y:parseFloat(el.style.top)||0,w:s?s.offsetWidth:160,h:s?s.offsetHeight:120};});
    const W=SIZES[rnd(0,SIZES.length)], H=Math.round(W*.75);
    const pos=findFreePos(W,H,placed);
    const rot=(Math.random()-.5)*16;
    const wrap=makeItem({title:file.name.replace(/\.[^.]+$/,''),year:''},pos.x,pos.y,rot,false,ev.target.result);
    activateItem(wrap);
    ['btn-add-more','sep-add','btn-restart','sep-restart','btn-finish'].forEach(id=>{
      document.getElementById(id).style.display=id.startsWith('sep')?'flex':'inline-block';
    });
  };
  reader.readAsDataURL(file);
}
document.getElementById('btn-restart').addEventListener('click',()=>{
  visitorItems.forEach(el=>el.remove());visitorItems=[];
  ['btn-add-more','sep-add','btn-restart','sep-restart','btn-finish'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('drop-overlay').classList.add('active');
});

// ═══ FINISH ══════════════════════════════════════════════
document.getElementById('btn-finish').addEventListener('click',openComplete);
document.getElementById('complete-close').addEventListener('click',()=>document.getElementById('complete-overlay').classList.remove('open'));

async function openComplete(){
  if(!visitorItems.length) return;
  const overlay=document.getElementById('complete-overlay');
  overlay.classList.add('open');
  const genEl=document.getElementById('preview-gen'); genEl.style.display='flex';
  const cv=document.getElementById('canvas-preview');
  const bw=board.offsetWidth, bh=board.offsetHeight;
  const DPR=Math.min(Math.max(window.devicePixelRatio||1,2),3);
  cv.width=Math.round(bw*DPR); cv.height=Math.round(bh*DPR);
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#f6f2ec'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let i=0;i<6000;i++){ctx.fillStyle=`rgba(24,20,14,${Math.random()*.034})`;ctx.fillRect(Math.random()*cv.width,Math.random()*cv.height,1,1);}
  const br=board.getBoundingClientRect();
  const sorted=[...visitorItems].sort((a,b)=>parseInt(a.style.zIndex||0)-parseInt(b.style.zIndex||0));
  await Promise.all(sorted.map(wrap=>new Promise(resolve=>{
    const img=wrap.querySelector('img'),sh=wrap.querySelector('.photo-shell');
    if(!img||!sh){resolve();return;}
    const wr=wrap.getBoundingClientRect(),sr=sh.getBoundingClientRect();
    const wCx=(wr.left+wr.right)/2-br.left, wCy=(wr.top+wr.bottom)/2-br.top;
    const rotM=(wrap.style.transform||'').match(/rotate\(([-\d.]+)deg\)/);
    const rot=rotM?parseFloat(rotM[1])*Math.PI/180:0;
    const sw=sr.width,sh2=sr.height,ox=(sr.left+sr.right)/2-br.left-wCx,oy=(sr.top+sr.bottom)/2-br.top-wCy;
    function draw(){
      ctx.save();ctx.scale(DPR,DPR);ctx.translate(wCx,wCy);ctx.rotate(rot);
      wrap.querySelectorAll('.tape').forEach(tape=>{
        const tr2=tape.getBoundingClientRect(),ts=window.getComputedStyle(tape).transform;
        let tRot=0;if(ts&&ts!=='none'){const m2=ts.match(/matrix\(([-\d.e]+),([-\d.e]+)/);if(m2)tRot=Math.atan2(parseFloat(m2[2]),parseFloat(m2[1]));}
        const txc=(tr2.left+tr2.right)/2-br.left-wCx,tyc=(tr2.top+tr2.bottom)/2-br.top-wCy;
        ctx.save();ctx.translate(txc,tyc);ctx.rotate(tRot);ctx.fillStyle='rgba(210,192,158,.4)';ctx.fillRect(-tr2.width/2,-tr2.height/2,tr2.width,tr2.height);ctx.restore();
      });
      ctx.shadowColor='rgba(24,20,14,.15)';ctx.shadowBlur=16;ctx.shadowOffsetY=5;
      ctx.fillStyle='#f0ece4';ctx.fillRect(ox-sw/2,oy-sh2/2,sw,sh2);ctx.shadowColor='transparent';
      ctx.save();ctx.beginPath();ctx.rect(ox-sw/2,oy-sh2/2,sw,sh2);ctx.clip();
      ctx.filter='saturate(0.72) contrast(0.92) brightness(1.06)';
      const nw=img.naturalWidth||sw,nh=img.naturalHeight||sh2,fsc=Math.max(sw/nw,sh2/nh);
      ctx.drawImage(img,ox-(nw*fsc)/2,oy-(nh*fsc)/2,nw*fsc,nh*fsc);
      ctx.filter='none';ctx.restore();ctx.restore();resolve();
    }
    if(img.complete&&img.naturalWidth>0)draw();else{img.onload=draw;img.onerror=resolve;}
  })));
  // Frame
  const fw=Math.round(15*DPR);
  ctx.fillStyle='#e8e2d8';
  ctx.fillRect(0,0,cv.width,fw);ctx.fillRect(0,cv.height-fw,cv.width,fw);
  ctx.fillRect(0,0,fw,cv.height);ctx.fillRect(cv.width-fw,0,fw,cv.height);
  ctx.strokeStyle='rgba(184,160,122,.48)';ctx.lineWidth=Math.round(DPR);
  ctx.strokeRect(fw+Math.round(2*DPR),fw+Math.round(2*DPR),cv.width-fw*2-Math.round(4*DPR),cv.height-fw*2-Math.round(4*DPR));
  ctx.strokeStyle='rgba(24,20,14,.09)';ctx.lineWidth=Math.round(DPR);
  ctx.strokeRect(.5,.5,cv.width-1,cv.height-1);
  const cd=Math.round(3.5*DPR),co=Math.round(7*DPR);
  ctx.fillStyle='rgba(184,160,122,.52)';
  [[co,co],[cv.width-co,co],[co,cv.height-co],[cv.width-co,cv.height-co]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,cd/2,0,Math.PI*2);ctx.fill();});
  ctx.font=`italic ${Math.round(10*DPR)}px Georgia,serif`;ctx.fillStyle='rgba(154,148,142,.5)';ctx.textAlign='right';
  ctx.fillText(`${CFG.artist.name} — canvas note`,cv.width-fw-Math.round(7*DPR),cv.height-Math.round(5*DPR));
  genEl.style.display='none';
  const aName=CFG.artist.name,twId=CFG.artist.twitter;
  document.getElementById('co-dl').onclick=()=>{const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=`${aName}-canvas.png`;a.click();showCoMsg('保存しました');};
  document.getElementById('co-x').onclick=()=>{
    const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=`${aName}-canvas.png`;a.click();
    const txt=encodeURIComponent(`${aName} — canvas note で私だけのキャンバスを作りました`);
    const url=encodeURIComponent(location.href.split('?')[0]);
    const via=twId?`&via=${twId}`:'';
    setTimeout(()=>{window.open(`https://twitter.com/intent/tweet?text=${txt}&url=${url}${via}`,'_blank');showCoMsg('画像を保存しました。Xのポストに添付してください');},500);
  };
  document.getElementById('co-ig').onclick=()=>{
    const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=`${aName}-canvas.png`;a.click();
    setTimeout(()=>{window.open('https://www.instagram.com/','_blank');showCoMsg('画像を保存しました。Instagramに投稿してください');},500);
  };
}
function showCoMsg(txt){const el=document.getElementById('co-msg');el.textContent=txt;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),4000);}

// ═══ INIT ════════════════════════════════════════════════
(async()=>{
  await loadConfig();

  // Pre-build all items hidden — no images loaded yet (lazy)
  const placed=[];
  const total=CFG.works.length;
  CFG.works.forEach((work,i)=>{
    const W=SIZES[Math.abs(Math.round(Math.sin(i*6.7)*2.4+2.4))%SIZES.length];
    const H=Math.round(W*.75);
    const pos=findFreePos(W,H,placed);
    const rot=(Math.random()-.5)*16;
    const wrap=makeItem(work,pos.x,pos.y,rot,true,null);
    wrap.style.display='none'; // hidden until selected via thumb
  });

  buildThumbBar();
  document.getElementById('loading').classList.add('gone');

  // After intro: auto-show random INITIAL_SHOW with animation
  document.getElementById('i-enter').addEventListener('click',()=>{
    document.getElementById('intro').classList.add('gone');
    setTimeout(showRandomInitial, 600);
  });
})();
</script>
