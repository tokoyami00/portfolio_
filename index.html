<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>常闇 — canvas note</title>
<meta name="description" content="写真を並べて、あなただけのキャンバスをつくる">
<meta property="og:title" content="常闇 — canvas note">
<meta property="og:description" content="写真を並べて、あなただけのキャンバスをつくる">
<meta property="og:type" content="website">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f2ec;--bg2:#edeae2;
  --ink:#18140e;--ink2:#4a4540;--ink3:#9a948e;
  --gold:#b8a07a;--g2:rgba(184,160,122,.28);
  --sh:rgba(24,20,14,.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:Georgia,'Times New Roman',serif;color:var(--ink);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.032;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 128 128' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px;mix-blend-mode:multiply;}

/* CURSOR */
#cur{position:fixed;width:5px;height:5px;border-radius:50%;background:var(--ink);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;}
#cur-ring{position:fixed;width:26px;height:26px;border-radius:50%;border:1px solid rgba(24,20,14,.22);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .18s,height .18s,border-color .18s;}

/* MODE BAR */
#mode-bar{position:fixed;top:0;left:0;right:0;z-index:600;display:flex;justify-content:center;
  background:linear-gradient(to bottom,var(--bg) 60%,transparent);padding-top:16px;pointer-events:none;}
#mode-inner{display:flex;align-items:center;pointer-events:all;
  background:rgba(246,242,236,.93);border:1px solid var(--g2);border-radius:26px;overflow:hidden;}
.tab{font-size:11.5px;letter-spacing:.15em;color:var(--ink3);background:none;border:none;
  cursor:pointer;padding:7px 18px;border-radius:22px;transition:color .2s,background .2s;white-space:nowrap;}
.tab.active{color:var(--ink);background:rgba(184,160,122,.18);}
.tab-sep{width:1px;height:13px;background:var(--g2);flex-shrink:0;}

/* HEADER */
#hdr{position:fixed;top:62px;left:32px;z-index:500;pointer-events:none;}
#hdr-name{font-size:13px;letter-spacing:.2em;font-style:italic;color:var(--ink);opacity:.7;}
#hdr-sub{font-size:9px;letter-spacing:.3em;color:var(--ink3);margin-top:4px;}

/* SOUND */
#snd-btn{position:fixed;top:68px;right:28px;z-index:600;background:none;border:none;cursor:pointer;
  font-size:11px;letter-spacing:.14em;color:var(--ink3);display:flex;align-items:center;gap:6px;padding:3px;transition:color .2s;}
#snd-btn:hover{color:var(--ink2);}
#waves{display:flex;gap:2px;align-items:center;height:11px;}
.wb{width:2px;border-radius:1px;background:var(--gold);}
.wb.m{height:3px!important;animation:none!important;}
.wb.a1{height:4px;animation:w1 1.3s ease-in-out infinite;}
.wb.a2{height:7px;animation:w2 1.5s ease-in-out infinite;}
.wb.a3{height:5px;animation:w3 1.2s ease-in-out infinite;}
.wb.a4{height:8px;animation:w4 1.7s ease-in-out infinite;}
@keyframes w1{0%,100%{height:4px}50%{height:10px}}
@keyframes w2{0%,100%{height:7px}50%{height:3px}}
@keyframes w3{0%,100%{height:5px}50%{height:11px}}
@keyframes w4{0%,100%{height:8px}50%{height:3px}}

/* BOARD */
#board{position:fixed;inset:0;z-index:10;overflow:hidden;cursor:none;}

/* PHOTO ITEM */
.photo-item{position:absolute;cursor:none;user-select:none;transform-origin:center;will-change:transform;}
.photo-shell{position:relative;background:var(--bg2);overflow:hidden;
  box-shadow:0 4px 18px var(--sh),0 1px 2px rgba(24,20,14,.05);transition:box-shadow .22s;}
.photo-item:hover .photo-shell{box-shadow:0 12px 40px var(--sh);}
.photo-item.dragging .photo-shell{box-shadow:0 22px 56px rgba(24,20,14,.18);}
.photo-shell img{display:block;width:100%;height:100%;object-fit:cover;object-position:center;
  filter:saturate(.68) contrast(.92) brightness(1.06);transition:filter .28s,opacity .5s;opacity:0;position:relative;z-index:1;}
.photo-shell img.loaded{opacity:1;}
.photo-item:hover .photo-shell img{filter:saturate(.78) contrast(.95) brightness(1.09);}
.tape{position:absolute;pointer-events:none;background:rgba(210,192,158,.34);}
.photo-item.selected .photo-shell{outline:1.5px solid rgba(184,160,122,.6);outline-offset:3px;}
.rh{position:absolute;bottom:-6px;right:-6px;width:17px;height:17px;border-radius:50%;
  background:var(--ink);cursor:se-resize;z-index:20;opacity:0;pointer-events:none;transition:opacity .18s;}
.photo-item.selected .rh{opacity:.68;pointer-events:all;}
.rh:hover{opacity:1!important;}

/* THUMB BAR */
#thumb-bar{position:fixed;bottom:70px;left:0;right:0;z-index:400;
  padding:8px 14px 6px;background:linear-gradient(to top,rgba(246,242,236,.98) 65%,transparent);
  transform:translateY(0);transition:transform .32s cubic-bezier(.23,1,.32,1);}
#thumb-bar.hidden{transform:translateY(calc(100% + 70px));}
#thumb-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:var(--g2) transparent;}
#thumb-scroll::-webkit-scrollbar{height:3px;}
#thumb-scroll::-webkit-scrollbar-thumb{background:var(--g2);border-radius:2px;}
.thumb{flex-shrink:0;width:60px;height:60px;border-radius:2px;overflow:hidden;
  cursor:pointer;position:relative;border:2px solid transparent;
  transition:border-color .15s,transform .15s,opacity .15s;opacity:.6;}
.thumb:hover{opacity:.9;transform:translateY(-2px);}
.thumb.active{border-color:var(--ink);opacity:1;}
.thumb.hl{border-color:var(--gold);opacity:1;transform:translateY(-3px) scale(1.05);}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.58);}
.thumb.active img{filter:saturate(.76);}
.tchk{position:absolute;top:3px;right:3px;width:13px;height:13px;border-radius:50%;
  background:var(--ink);display:none;align-items:center;justify-content:center;}
.thumb.active .tchk{display:flex;}
.tchk::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);}
#tctrl{display:flex;align-items:center;gap:9px;padding:5px 2px 0;flex-wrap:wrap;}
#tlbl{font-size:9.5px;letter-spacing:.2em;color:var(--ink3);}
.tcb{font-size:10.5px;letter-spacing:.1em;color:var(--ink3);background:none;border:none;cursor:pointer;padding:1px 4px;transition:color .18s;}
.tcb:hover{color:var(--ink);}
.tsep{width:1px;height:11px;background:var(--g2);}
#tcnt{font-size:9.5px;letter-spacing:.1em;color:var(--gold);margin-left:auto;}

/* DROP OVERLAY */
#drop-ov{position:fixed;inset:0;z-index:700;
  border:2px dashed rgba(184,160,122,.38);background:rgba(246,242,236,.82);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
  opacity:0;pointer-events:none;transition:opacity .28s;cursor:pointer;}
#drop-ov.on{opacity:1;pointer-events:all;}
#drop-ov p{font-size:20px;font-style:italic;letter-spacing:.1em;color:var(--ink2);}
#drop-ov small{font-size:10px;letter-spacing:.26em;color:var(--ink3);}
#drop-x{position:absolute;top:24px;right:28px;background:none;border:none;cursor:pointer;
  font-size:22px;color:var(--ink3);line-height:1;pointer-events:all;}
#drop-x:hover{color:var(--ink);}
#filein{display:none;}

/* NAV */
#nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:600;
  display:flex;align-items:center;
  background:rgba(246,242,236,.93);border:1px solid var(--g2);border-radius:26px;overflow:hidden;}
.nb{font-size:11px;letter-spacing:.13em;color:var(--ink3);background:none;border:none;
  cursor:pointer;padding:8px 17px;transition:color .18s,background .18s;white-space:nowrap;}
.nb:hover{color:var(--ink);background:rgba(184,160,122,.08);}
.nb.fin{color:var(--ink2);}
.nb.fin:hover{color:var(--ink);background:rgba(184,160,122,.14);}
.nsep{width:1px;background:var(--g2);align-self:stretch;}

/* INFO */
#info{position:fixed;bottom:18px;left:28px;z-index:500;font-size:9px;letter-spacing:.24em;color:var(--ink3);pointer-events:none;}

/* COMPLETE OVERLAY */
#co-ov{position:fixed;inset:0;z-index:800;
  background:rgba(246,242,236,.96);backdrop-filter:blur(18px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .45s;overflow-y:auto;padding:52px 18px 32px;}
#co-ov.on{opacity:1;pointer-events:all;}
#co-ov h1{font-size:44px;font-weight:400;font-style:italic;letter-spacing:.1em;color:var(--ink);}
#co-sub{font-size:9.5px;letter-spacing:.3em;color:var(--ink3);}
#co-prev-wrap{position:relative;width:min(600px,88vw);}
#co-prev{display:block;width:100%;box-shadow:0 8px 40px rgba(24,20,14,.15);}
#co-gen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(246,242,236,.8);font-size:9.5px;letter-spacing:.26em;color:var(--ink3);}
.corow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.cob{font-size:11.5px;letter-spacing:.1em;color:var(--ink2);background:none;
  border:1px solid rgba(184,160,122,.38);border-radius:3px;
  padding:8px 16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px;}
.cob:hover{background:var(--bg2);color:var(--ink);}
.cob.xb:hover{background:#000;color:#fff;border-color:#000;}
.cob.ib:hover{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff;border-color:transparent;}
#co-msg{font-size:9.5px;letter-spacing:.26em;color:var(--gold);min-height:14px;opacity:0;transition:opacity .28s;}
#co-msg.on{opacity:1;}
#co-x{position:absolute;top:24px;right:28px;background:none;border:none;cursor:pointer;font-size:24px;color:var(--ink3);transition:color .18s;line-height:1;}
#co-x:hover{color:var(--ink);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:1000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
#intro.off{opacity:0;pointer-events:none;transition:opacity 1s;}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
#iname{font-size:50px;font-weight:400;font-style:italic;letter-spacing:.12em;color:var(--ink);
  opacity:0;animation:rise 1.4s .2s cubic-bezier(.23,1,.32,1) forwards;}
#isub{font-size:9.5px;letter-spacing:.36em;color:var(--ink3);margin-top:11px;
  opacity:0;animation:rise 1.4s .65s cubic-bezier(.23,1,.32,1) forwards;}
#iline{width:32px;height:1px;background:var(--g2);margin:22px auto;
  opacity:0;animation:rise 1.4s .95s cubic-bezier(.23,1,.32,1) forwards;}
#ienter{font-size:11.5px;letter-spacing:.18em;color:var(--ink3);
  background:none;border:1px solid var(--g2);border-radius:2px;padding:8px 28px;cursor:pointer;
  opacity:0;animation:rise 1.4s 1.35s cubic-bezier(.23,1,.32,1) forwards;transition:all .22s;}
#ienter:hover{color:var(--ink);border-color:var(--gold);background:var(--bg2);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:1100;background:var(--bg);
  display:flex;align-items:center;justify-content:center;}
#loading.off{opacity:0;pointer-events:none;transition:opacity .5s;}
#ldot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.65)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<!-- LOADING (shown until JS completes) -->
<div id="loading"><div id="ldot"></div></div>

<!-- CUSTOM CURSOR -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- INTRO SCREEN -->
<div id="intro">
  <div id="iname">常闇</div>
  <div id="isub">a quiet archive</div>
  <div id="iline"></div>
  <button id="ienter">enter</button>
</div>

<!-- MODE BAR -->
<div id="mode-bar">
  <div id="mode-inner">
    <button class="tab active" id="tab-p">常闇の作品</button>
    <div class="tab-sep"></div>
    <button class="tab" id="tab-v">あなたのキャンバス</button>
  </div>
</div>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-name">常闇</div>
  <div id="hdr-sub">canvas note</div>
</div>

<!-- SOUND -->
<button id="snd-btn">
  <div id="waves">
    <div class="wb a1 m"></div><div class="wb a2 m"></div>
    <div class="wb a3 m"></div><div class="wb a4 m"></div>
  </div>
  <span id="snd-lbl">sound</span>
</button>

<!-- BOARD -->
<div id="board"></div>

<!-- THUMBNAIL BAR (portfolio mode) -->
<div id="thumb-bar">
  <div id="thumb-scroll"></div>
  <div id="tctrl">
    <span id="tlbl">表示する作品</span>
    <div class="tsep"></div>
    <button class="tcb" id="tb-all">すべて</button>
    <button class="tcb" id="tb-none">なし</button>
    <button class="tcb" id="tb-rnd">ランダム10</button>
    <div class="tsep"></div>
    <button class="tcb" id="tb-shuffle">⊞ 並べ直す</button>
    <span id="tcnt"></span>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nb" id="nb-reset">reset</button>
  <div class="nsep" id="ns-reset"></div>
  <button class="nb" id="nb-add"     style="display:none">+ 写真を追加</button>
  <div class="nsep" id="ns-add"      style="display:none"></div>
  <button class="nb" id="nb-restart" style="display:none">↩ 最初から</button>
  <div class="nsep" id="ns-restart"  style="display:none"></div>
  <button class="nb fin" id="nb-finish" style="display:none">完成する →</button>
</div>
<input type="file" id="filein" accept="image/*" multiple>

<div id="info"><span id="info-txt">ドラッグして鑑賞する</span></div>

<!-- DROP OVERLAY -->
<div id="drop-ov">
  <button id="drop-x">×</button>
  <p>写真をドロップ</p>
  <small>または クリックして選択</small>
</div>

<!-- COMPLETE OVERLAY -->
<div id="co-ov">
  <button id="co-x">×</button>
  <h1>beautiful.</h1>
  <p id="co-sub">あなたのキャンバスが完成しました</p>
  <div id="co-prev-wrap">
    <canvas id="co-prev"></canvas>
    <div id="co-gen">生成中...</div>
  </div>
  <div class="corow">
    <button class="cob" id="co-dl">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      画像を保存
    </button>
    <button class="cob xb" id="co-tw">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X でシェア
    </button>
    <button class="cob ib" id="co-ig">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      Instagram
    </button>
  </div>
  <div id="co-msg"></div>
</div>

<script>
// =====================================================
// UTILS
// =====================================================
function eid(id){ return document.getElementById(id); }
function rnd(a,b){ return Math.floor(Math.random()*(b-a))+a; }
function shuffle(a){ return a.slice().sort(()=>Math.random()-.5); }

// =====================================================
// CONFIG
// =====================================================
var CFG = {
  artist:{name:'常闇',name_en:'tokoyami',tagline:'a quiet archive',twitter:'',instagram:''},
  works:[]
};
var INITIAL_SHOW = 10;
var SIZES = [115,145,170,205,245,270];
var ITEM_MAX_H = 340, MIN_W = 75, MAX_W = 450;

// =====================================================
// CURSOR
// =====================================================
var cur=eid('cur'), ring=eid('cur-ring');
var cx=0,cy=0,rx=0,ry=0;
document.addEventListener('mousemove',function(e){
  cx=e.clientX;cy=e.clientY;
  cur.style.left=cx+'px';cur.style.top=cy+'px';
});
(function lp(){
  rx+=(cx-rx)*.13;ry+=(cy-ry)*.13;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(lp);
})();
document.addEventListener('mousedown',function(){ring.style.transform='translate(-50%,-50%) scale(.58)';});
document.addEventListener('mouseup',function(){ring.style.transform='translate(-50%,-50%) scale(1)';});

// =====================================================
// AUDIO (lazy init on first click)
// =====================================================
var actx=null, mGain=null, sOn=false;
function initAudio(){
  if(actx) return;
  actx = new(window.AudioContext||window.webkitAudioContext)();
  mGain = actx.createGain(); mGain.gain.value=0; mGain.connect(actx.destination);
  var rev=actx.createConvolver(), rl=actx.sampleRate*3, rb=actx.createBuffer(2,rl,actx.sampleRate);
  for(var c=0;c<2;c++){var d=rb.getChannelData(c);for(var i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.5);}
  rev.buffer=rb; rev.connect(mGain);
  var nb=actx.sampleRate, nbuf=actx.createBuffer(1,nb,actx.sampleRate), nd=nbuf.getChannelData(0);
  for(var i=0;i<nb;i++) nd[i]=Math.random()*2-1;
  var ns=actx.createBufferSource(); ns.buffer=nbuf; ns.loop=true;
  var nf=actx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=220;
  var ng=actx.createGain(); ng.gain.value=.01;
  ns.connect(nf); nf.connect(ng); ng.connect(rev); ns.start();
  [49,73,98].forEach(function(f,i){
    var o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=f; g.gain.value=.005-i*.0012;
    var lfo=actx.createOscillator(), lg=actx.createGain();
    lfo.frequency.value=.04+i*.018; lg.gain.value=.0025;
    lfo.connect(lg); lg.connect(g.gain); lfo.start(); o.connect(g); g.connect(rev); o.start();
  });
  function bell(){
    if(!sOn) return;
    var o=actx.createOscillator(), g=actx.createGain();
    o.type='sine'; o.frequency.value=[396,528,440,330][rnd(0,4)];
    g.gain.setValueAtTime(0,actx.currentTime);
    g.gain.linearRampToValueAtTime(.04,actx.currentTime+.014);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+3);
    o.connect(g); g.connect(rev); o.start(); o.stop(actx.currentTime+4);
    setTimeout(bell, 5000+rnd(0,8000));
  }
  setTimeout(bell,2500);
}
eid('snd-btn').addEventListener('click',function(){
  initAudio();
  sOn=!sOn;
  if(mGain){
    mGain.gain.cancelScheduledValues(actx.currentTime);
    mGain.gain.setValueAtTime(mGain.gain.value,actx.currentTime);
    mGain.gain.linearRampToValueAtTime(sOn?.65:0,actx.currentTime+1.4);
  }
  document.querySelectorAll('.wb').forEach(function(b){b.classList.toggle('m',!sOn);});
  eid('snd-lbl').textContent = sOn?'on':'sound';
});

// =====================================================
// BOARD STATE
// =====================================================
var board = eid('board');
var portItems = [];   // {wrap, work, visible, w, h}
var visItems  = [];
var zTop=10, dragging=null, dox=0, doy=0;
var mode = 'portfolio';

// =====================================================
// NO-OVERLAP PLACEMENT
// =====================================================
function findFreePos(W, H, placed){
  var M=22, bW=board.offsetWidth, bH=board.offsetHeight;
  var TOP=106, BOT=bH-82;
  var rW=W+M, rH=H+M;
  for(var t=0; t<400; t++){
    var x=rnd(10, Math.max(11, bW-W-10));
    var y=rnd(TOP, Math.max(TOP+1, BOT-H));
    var ok=true;
    for(var i=0; i<placed.length; i++){
      var p=placed[i];
      if(x<p.x+p.w && x+rW>p.x && y<p.y+p.h && y+rH>p.y){ok=false;break;}
    }
    if(ok){ placed.push({x:x,y:y,w:rW,h:rH}); return {x:x,y:y}; }
  }
  // grid fallback
  var cols=Math.max(1,Math.floor((bW-20)/(W+M+8)));
  var idx=placed.length;
  var gx=10+(idx%cols)*(W+M+8);
  var gy=TOP+Math.floor(idx/cols)*(H+M+8);
  placed.push({x:gx,y:gy,w:rW,h:rH});
  return {x:Math.min(gx,bW-W-10), y:Math.min(gy,BOT-H)};
}

function getWH(wrap){
  var sh=wrap.querySelector('.photo-shell');
  if(!sh) return {w:160,h:120};
  return {
    w: sh.offsetWidth  || parseInt(sh.style.width)  || 160,
    h: sh.offsetHeight || parseInt(sh.style.height) || 120
  };
}

// =====================================================
// MAKE PHOTO ITEM
// =====================================================
function makeItem(work, x, y, rot, isPort, imgSrc){
  var n = portItems.length + visItems.length;
  var tW = SIZES[Math.abs(Math.round(Math.sin(n*6.7)*2.4+2.4)) % SIZES.length];

  var wrap = document.createElement('div');
  wrap.className = 'photo-item';
  wrap.style.cssText = 'left:'+x+'px;top:'+y+'px;z-index:'+(zTop++)+';transform:rotate('+rot+'deg);opacity:0;';

  var shell = document.createElement('div');
  shell.className = 'photo-shell';
  shell.style.width = tW+'px';
  shell.style.height = Math.round(tW*.75)+'px';

  var img = document.createElement('img');
  img.dataset.src = imgSrc || ('images/'+work.file);
  img.alt = work.title||'';
  img.crossOrigin = 'anonymous';

  // Lazy load — only fetch when activated
  wrap._load = function(){
    if(img.src && img.src !== window.location.href) return;
    img.src = img.dataset.src;
    img.onload = function(){
      img.classList.add('loaded');
      var ratio = img.naturalHeight/img.naturalWidth;
      var W=tW, H=Math.min(Math.round(W*ratio), ITEM_MAX_H);
      shell.style.width=W+'px'; shell.style.height=H+'px';
      if(isPort){
        var e=portItems.find(function(p){return p.wrap===wrap;});
        if(e){e.w=W;e.h=H;}
      }
      addTapes(wrap,W,H);
    };
    img.onerror = function(){ shell.style.background='#ccc'; img.classList.add('loaded'); };
  };

  shell.appendChild(img);
  var rh = document.createElement('div'); rh.className='rh';
  wrap.appendChild(rh);
  wrap.appendChild(shell);
  board.appendChild(wrap);
  makeDrag(wrap);
  makeResize(wrap,rh);

  if(isPort) portItems.push({wrap:wrap,work:work,visible:false,w:tW,h:Math.round(tW*.75)});
  else       visItems.push(wrap);

  return wrap;
}

function showItem(wrap, x, y, rot){
  wrap.style.left  = x+'px';
  wrap.style.top   = y+'px';
  wrap.style.transform = 'rotate('+rot+'deg)';
  wrap.style.zIndex = zTop++;
  wrap.style.display = '';
  wrap._load();
  wrap.style.transition = 'opacity .55s ease, transform .65s cubic-bezier(.23,1,.32,1)';
  wrap.style.opacity = '1';
  setTimeout(function(){wrap.style.transition='';}, 700);
}

function addTapes(wrap,W,H){
  wrap.querySelectorAll('.tape').forEach(function(t){t.remove();});
  var n=Math.random()>.42?1:2;
  for(var t=0;t<n;t++){
    var tp=document.createElement('div'); tp.className='tape';
    var tw=34+Math.random()*22, th=9+Math.random()*5, tr=-15+Math.random()*30;
    tp.style.cssText = t===0
      ? 'width:'+tw+'px;height:'+th+'px;top:-'+(th*.5)+'px;left:'+(W*.2+Math.random()*W*.4)+'px;transform:rotate('+tr+'deg);'
      : 'width:'+th+'px;height:'+tw+'px;left:-'+(th*.5)+'px;top:'+(H*.2+Math.random()*H*.4)+'px;transform:rotate('+tr+'deg);';
    wrap.appendChild(tp);
  }
}

// =====================================================
// THUMBNAIL BAR
// =====================================================
var thumbScroll = eid('thumb-scroll');

function buildThumbs(){
  thumbScroll.innerHTML='';
  portItems.forEach(function(item,i){
    var div=document.createElement('div');
    div.className='thumb'; div.dataset.i=i;
    var img=document.createElement('img');
    img.src='images/'+item.work.file; img.loading='lazy'; img.alt='';
    var chk=document.createElement('div'); chk.className='tchk';
    div.appendChild(img); div.appendChild(chk);
    div.addEventListener('click',function(){thumbToggle(i);});
    thumbScroll.appendChild(div);
  });
  updateCount();
}

function thumbToggle(idx, force){
  var item = portItems[idx];
  var div  = thumbScroll.children[idx];
  if(!div||!item) return;
  var nv = force!==undefined ? !!force : !item.visible;
  if(nv===item.visible) return;
  item.visible = nv;
  div.classList.toggle('active', nv);
  if(nv){
    var placed = portItems
      .filter(function(p){return p.visible && p!==item;})
      .map(function(p){
        var wh=getWH(p.wrap);
        return {x:parseFloat(p.wrap.style.left)||0,y:parseFloat(p.wrap.style.top)||0,w:wh.w+22,h:wh.h+22};
      });
    var wh=getWH(item.wrap);
    var pos=findFreePos(wh.w,wh.h,placed);
    var rot=(Math.random()-.5)*16;
    showItem(item.wrap,pos.x,pos.y,rot);
  } else {
    item.wrap.style.transition='opacity .3s';
    item.wrap.style.opacity='0';
    setTimeout(function(){item.wrap.style.display='none';item.wrap.style.transition='';},320);
  }
  updateCount();
}

function updateCount(){
  var n=portItems.filter(function(x){return x.visible;}).length;
  eid('tcnt').textContent = n+' / '+portItems.length;
}

// Shuffle layout (no overlap)
function shuffleAll(items){
  var wraps = shuffle(items.map(function(it){return it.wrap||it;}))
    .filter(function(w){return w && w.style.display!=='none';});
  var placed=[];
  // Pre-compute all positions first
  var moves = wraps.map(function(wrap){
    var wh=getWH(wrap);
    var pos=findFreePos(wh.w,wh.h,placed);
    return {wrap:wrap, pos:pos, rot:(Math.random()-.5)*16};
  });
  // Apply with stagger
  moves.forEach(function(m,i){
    setTimeout(function(){
      m.wrap.style.transition='left .48s cubic-bezier(.23,1,.32,1),top .48s,transform .48s';
      m.wrap.style.left  = m.pos.x+'px';
      m.wrap.style.top   = m.pos.y+'px';
      m.wrap.style.transform = 'rotate('+m.rot+'deg)';
      m.wrap.style.zIndex = zTop++;
      setTimeout(function(){m.wrap.style.transition='';},520);
    },i*50);
  });
}

// Initial random show with thumb animation
var _initDone = false;
function showInitial(){
  if(_initDone) return;
  _initDone = true;
  var indices = shuffle(portItems.map(function(_,i){return i;})).slice(0,INITIAL_SHOW);
  var placed  = [];
  indices.forEach(function(idx,i){
    setTimeout(function(){
      var item=portItems[idx];
      var div=thumbScroll.children[idx];
      if(div){
        div.classList.add('hl');
        setTimeout(function(){div.classList.remove('hl');div.classList.add('active');},340);
      }
      item.visible=true;
      var wh=getWH(item.wrap);
      var pos=findFreePos(wh.w,wh.h,placed);
      var rot=(Math.random()-.5)*16;
      showItem(item.wrap,pos.x,pos.y,rot);
      updateCount();
    },i*160);
  });
}

// Thumb controls
eid('tb-all').addEventListener('click',function(){portItems.forEach(function(_,i){thumbToggle(i,true);});});
eid('tb-none').addEventListener('click',function(){portItems.forEach(function(_,i){thumbToggle(i,false);});});
eid('tb-rnd').addEventListener('click',function(){

});

// =====================================================
// SELECT + RESIZE
// =====================================================
var sel=null;
function selectItem(el){
  if(sel&&sel!==el) sel.classList.remove('selected');
  sel=el; el.classList.add('selected'); el.style.zIndex=zTop++;
}
function deselect(){if(sel){sel.classList.remove('selected');sel=null;}}
board.addEventListener('mousedown',function(e){
  if(!e.target.closest('.photo-item')&&!e.target.classList.contains('rh')) deselect();
});

var resizing=null, rsX=0, rsW=0, rsH=0, rsR=1;
function makeResize(wrap,handle){
  function start(ex){
    var sh=wrap.querySelector('.photo-shell'), im=wrap.querySelector('img');
    resizing=wrap; rsX=ex; rsW=sh.offsetWidth; rsH=sh.offsetHeight;
    rsR=im&&im.naturalWidth?im.naturalHeight/im.naturalWidth:rsH/rsW;
    wrap.style.zIndex=zTop++; document.body.style.cursor='se-resize';
  }
  handle.addEventListener('mousedown',function(e){e.stopPropagation();e.preventDefault();start(e.clientX);});
  handle.addEventListener('touchstart',function(e){e.stopPropagation();e.preventDefault();start(e.touches[0].clientX);},{passive:false});
}
function doResize(ex){
  var nW=Math.min(MAX_W,Math.max(MIN_W,rsW+(ex-rsX)));
  var nH=Math.round(nW*rsR);
  var sh=resizing.querySelector('.photo-shell');
  sh.style.width=nW+'px'; sh.style.height=nH+'px';
  addTapes(resizing,nW,nH);
}
document.addEventListener('mousemove',function(e){if(resizing)doResize(e.clientX);});
document.addEventListener('touchmove',function(e){if(resizing){e.preventDefault();doResize(e.touches[0].clientX);}},{passive:false});
document.addEventListener('mouseup',function(){if(resizing){resizing=null;document.body.style.cursor='';}});
document.addEventListener('touchend',function(){resizing=null;});

// =====================================================
// DRAG
// =====================================================
function makeDrag(el){
  el.addEventListener('mousedown',function(e){e.preventDefault();selectItem(el);startDrag(el,e.clientX,e.clientY);});
  el.addEventListener('touchstart',function(e){e.preventDefault();selectItem(el);startDrag(el,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
}
function startDrag(el,ex,ey){
  dragging=el; var r=el.getBoundingClientRect(); dox=ex-r.left; doy=ey-r.top;
  el.classList.add('dragging'); el.style.zIndex=zTop++;
  ring.style.width='38px'; ring.style.height='38px'; ring.style.borderColor='rgba(184,160,122,.7)';
}
document.addEventListener('mousemove',function(e){if(dragging)moveDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',function(e){if(dragging){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
function moveDrag(ex,ey){
  var br=board.getBoundingClientRect();
  dragging.style.left=(ex-br.left-dox)+'px';
  dragging.style.top=(ey-br.top-doy)+'px';
}
document.addEventListener('mouseup',endDrag); document.addEventListener('touchend',endDrag);
function endDrag(){
  if(!dragging) return;
  dragging.classList.remove('dragging'); dragging=null;
  ring.style.width='26px'; ring.style.height='26px'; ring.style.borderColor='rgba(24,20,14,.22)';
}
board.addEventListener('mouseover',function(e){if(e.target.closest('.photo-item')){ring.style.width='36px';ring.style.height='36px';}});
board.addEventListener('mouseout',function(e){if(e.target.closest('.photo-item')&&!dragging){ring.style.width='26px';ring.style.height='26px';}});

// =====================================================
// MODE SWITCH
// =====================================================
function setMode(m){
  if(m===mode) return;
  mode=m;
  var isP=mode==='portfolio';
  eid('tab-p').classList.toggle('active',isP);
  eid('tab-v').classList.toggle('active',!isP);
  portItems.forEach(function(it){it.wrap.style.display=(!isP||!it.visible)?'none':'';});
  visItems.forEach(function(el){el.style.display=isP?'none':'';});
  eid('thumb-bar').classList.toggle('hidden',!isP);
  eid('info-txt').textContent = isP?'ドラッグして鑑賞する':'写真を並べてキャンバスを完成させる';
  var hV=visItems.length>0;
  eid('nb-reset').style.display    = isP?'inline-block':'none';
  eid('ns-reset').style.display    = isP?'flex':'none';
  eid('nb-add').style.display      = (!isP&&hV)?'inline-block':'none';
  eid('ns-add').style.display      = (!isP&&hV)?'flex':'none';
  eid('nb-restart').style.display  = (!isP&&hV)?'inline-block':'none';
  eid('ns-restart').style.display  = (!isP&&hV)?'flex':'none';
  eid('nb-finish').style.display   = (!isP&&hV)?'inline-block':'none';

}
eid('tab-p').addEventListener('click',function(){setMode('portfolio');});
eid('tab-v').addEventListener('click',function(){setMode('visitor');});

// =====================================================
// UPLOAD
// =====================================================
var dropOv=eid('drop-ov'), filein=eid('filein');
dropOv.addEventListener('click',function(){filein.click();});
eid('drop-x').addEventListener('click',function(e){
  e.stopPropagation(); dropOv.classList.remove('on');
  if(!visItems.length) setMode('portfolio');
});
eid('nb-add').addEventListener('click',function(){filein.click();});
filein.addEventListener('change',function(e){Array.from(e.target.files).forEach(loadFile);filein.value='';});
board.addEventListener('dragover',function(e){e.preventDefault();if(mode==='visitor')dropOv.classList.add('on');});
board.addEventListener('dragleave',function(e){if(!board.contains(e.relatedTarget))dropOv.classList.remove('on');});
board.addEventListener('drop',function(e){
  e.preventDefault(); dropOv.classList.remove('on');
  if(mode!=='visitor') return;
  Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('image/');}).forEach(loadFile);
});
function loadFile(file){
  dropOv.classList.remove('on');
  var reader=new FileReader();
  reader.onload=function(ev){
    var placed=visItems.map(function(el){
      var sh=el.querySelector('.photo-shell');
      return {x:parseFloat(el.style.left)||0,y:parseFloat(el.style.top)||0,
              w:(sh?sh.offsetWidth:160)+22,h:(sh?sh.offsetHeight:120)+22};
    });
    var W=SIZES[rnd(0,SIZES.length)], H=Math.round(W*.75);
    var pos=findFreePos(W,H,placed);
    var wrap=makeItem({title:file.name.replace(/\.[^.]+$/,''),year:''},pos.x,pos.y,(Math.random()-.5)*16,false,ev.target.result);
    showItem(wrap,pos.x,pos.y,(Math.random()-.5)*16);
    ['nb-add','ns-add','nb-restart','ns-restart','nb-finish'].forEach(function(id){
      eid(id).style.display=id.startsWith('ns')?'flex':'inline-block';
    });
  };
  reader.readAsDataURL(file);
}
eid('nb-restart').addEventListener('click',function(){
  visItems.forEach(function(el){el.remove();}); visItems=[];
  ['nb-add','ns-add','nb-restart','ns-restart','nb-finish'].forEach(function(id){eid(id).style.display='none';});
  eid('drop-ov').classList.add('on');
});
eid('nb-reset').addEventListener('click',function(){
  shuffleAll(portItems.filter(function(x){return x.visible;}));
});

// =====================================================
// FINISH / CANVAS EXPORT
// =====================================================
eid('nb-finish').addEventListener('click',openComplete);
eid('co-x').addEventListener('click',function(){eid('co-ov').classList.remove('on');});

function openComplete(){
  if(!visItems.length) return;
  var ov=eid('co-ov'); ov.classList.add('on');
  var gen=eid('co-gen'); gen.style.display='flex';
  var cv=eid('co-prev');
  var bW=board.offsetWidth, bH=board.offsetHeight;
  var DPR=Math.min(Math.max(window.devicePixelRatio||1,2),3);
  cv.width=Math.round(bW*DPR); cv.height=Math.round(bH*DPR);
  var ctx=cv.getContext('2d');
  ctx.fillStyle='#f6f2ec'; ctx.fillRect(0,0,cv.width,cv.height);
  for(var gi=0;gi<6000;gi++){ctx.fillStyle='rgba(24,20,14,'+(Math.random()*.032)+')';ctx.fillRect(Math.random()*cv.width,Math.random()*cv.height,1,1);}

  var br=board.getBoundingClientRect();
  var sorted=visItems.slice().sort(function(a,b){return parseInt(a.style.zIndex||0)-parseInt(b.style.zIndex||0);});
  var pending=sorted.length;
  if(!pending){finishCanvas(ctx,cv,DPR,gen);return;}

  sorted.forEach(function(wrap){
    var img=wrap.querySelector('img'), sh=wrap.querySelector('.photo-shell');
    if(!img||!sh){if(!--pending)finishCanvas(ctx,cv,DPR,gen);return;}
    var wr=wrap.getBoundingClientRect(), sr=sh.getBoundingClientRect();
    var wCx=(wr.left+wr.right)/2-br.left, wCy=(wr.top+wr.bottom)/2-br.top;
    var rm=(wrap.style.transform||'').match(/rotate\(([-\d.]+)deg\)/);
    var rot=rm?parseFloat(rm[1])*Math.PI/180:0;
    var sw=sr.width, sh2=sr.height;
    var ox=(sr.left+sr.right)/2-br.left-wCx, oy=(sr.top+sr.bottom)/2-br.top-wCy;
    function draw(){
      ctx.save(); ctx.scale(DPR,DPR); ctx.translate(wCx,wCy); ctx.rotate(rot);
      wrap.querySelectorAll('.tape').forEach(function(tape){
        var tr=tape.getBoundingClientRect(), ts=window.getComputedStyle(tape).transform;
        var tRot=0;
        if(ts&&ts!=='none'){var m2=ts.match(/matrix\(([-\d.e]+),([-\d.e]+)/);if(m2)tRot=Math.atan2(parseFloat(m2[2]),parseFloat(m2[1]));}
        var txc=(tr.left+tr.right)/2-br.left-wCx, tyc=(tr.top+tr.bottom)/2-br.top-wCy;
        ctx.save();ctx.translate(txc,tyc);ctx.rotate(tRot);
        ctx.fillStyle='rgba(210,192,158,.4)';ctx.fillRect(-tr.width/2,-tr.height/2,tr.width,tr.height);ctx.restore();
      });
      ctx.shadowColor='rgba(24,20,14,.15)'; ctx.shadowBlur=16; ctx.shadowOffsetY=5;
      ctx.fillStyle='#f0ece4'; ctx.fillRect(ox-sw/2,oy-sh2/2,sw,sh2); ctx.shadowColor='transparent';
      ctx.save(); ctx.beginPath(); ctx.rect(ox-sw/2,oy-sh2/2,sw,sh2); ctx.clip();
      ctx.filter='saturate(0.72) contrast(0.92) brightness(1.06)';
      var nw=img.naturalWidth||sw, nh=img.naturalHeight||sh2, fsc=Math.max(sw/nw,sh2/nh);
      ctx.drawImage(img,ox-(nw*fsc)/2,oy-(nh*fsc)/2,nw*fsc,nh*fsc);
      ctx.filter='none'; ctx.restore(); ctx.restore();
      if(!--pending) finishCanvas(ctx,cv,DPR,gen);
    }
    if(img.complete&&img.naturalWidth>0) draw();
    else { img.onload=draw; img.onerror=function(){if(!--pending)finishCanvas(ctx,cv,DPR,gen);}; }
  });
}

function finishCanvas(ctx,cv,DPR,gen){
  var fw=Math.round(15*DPR);
  ctx.fillStyle='#e8e2d8';
  ctx.fillRect(0,0,cv.width,fw); ctx.fillRect(0,cv.height-fw,cv.width,fw);
  ctx.fillRect(0,0,fw,cv.height); ctx.fillRect(cv.width-fw,0,fw,cv.height);
  ctx.strokeStyle='rgba(184,160,122,.48)'; ctx.lineWidth=Math.round(DPR);
  ctx.strokeRect(fw+2*DPR,fw+2*DPR,cv.width-fw*2-4*DPR,cv.height-fw*2-4*DPR);
  ctx.strokeStyle='rgba(24,20,14,.09)'; ctx.lineWidth=Math.round(DPR);
  ctx.strokeRect(.5,.5,cv.width-1,cv.height-1);
  var co=Math.round(7*DPR); ctx.fillStyle='rgba(184,160,122,.52)';
  [[co,co],[cv.width-co,co],[co,cv.height-co],[cv.width-co,cv.height-co]].forEach(function(pt){
    ctx.beginPath();ctx.arc(pt[0],pt[1],Math.round(3.5*DPR),0,Math.PI*2);ctx.fill();
  });
  ctx.font='italic '+Math.round(10*DPR)+'px Georgia,serif';
  ctx.fillStyle='rgba(154,148,142,.5)'; ctx.textAlign='right';
  ctx.fillText(CFG.artist.name+' — canvas note', cv.width-fw-7*DPR, cv.height-5*DPR);
  gen.style.display='none';

  var aName=CFG.artist.name, twId=CFG.artist.twitter;
  eid('co-dl').onclick=function(){
    var a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download=aName+'-canvas.png'; a.click();
    showMsg('保存しました');
  };
  eid('co-tw').onclick=function(){
    var a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download=aName+'-canvas.png'; a.click();
    var txt=encodeURIComponent(aName+' — canvas note で私だけのキャンバスを作りました');
    var url=encodeURIComponent(location.href.split('?')[0]);
    var via=twId?'&via='+twId:'';
    setTimeout(function(){window.open('https://twitter.com/intent/tweet?text='+txt+'&url='+url+via,'_blank');showMsg('画像を保存しました。Xのポストに添付してください');},500);
  };
  eid('co-ig').onclick=function(){
    var a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download=aName+'-canvas.png'; a.click();
    setTimeout(function(){window.open('https://www.instagram.com/','_blank');showMsg('画像を保存しました。Instagramに投稿してください');},500);
  };
}
function showMsg(t){var el=eid('co-msg');el.textContent=t;el.classList.add('on');setTimeout(function(){el.classList.remove('on');},4000);}

// =====================================================
// INIT — runs immediately, no async/await
// =====================================================

// Wire enter button FIRST — before any network call
eid('ienter').addEventListener('click', function(){
  eid('intro').classList.add('off');

// Load config then build UI
fetch('images.json', {cache:'no-cache'})
  .then(function(r){ return r.ok ? r.json() : Promise.reject('not found'); })
  .then(function(data){
    CFG = data;
    document.title = CFG.artist.name+' — canvas note';

    eid('hdr-name').textContent = CFG.artist.name;
  })
  .catch(function(e){ console.warn('images.json:', e); })
  .finally(function(){

    var placed=[];
    CFG.works.forEach(function(work,i){
      var W=SIZES[Math.abs(Math.round(Math.sin(i*6.7)*2.4+2.4))%SIZES.length];
      var H=Math.round(W*.75);
      var pos=findFreePos(W,H,placed);
      var rot=(Math.random()-.5)*16;
      var wrap=makeItem(work,pos.x,pos.y,rot,true,null);
      wrap.style.display='none';
    });
    buildThumbs();
    // Hide loading screen — ALWAYS runs
    eid('loading').classList.add('off');
  });
</script>
